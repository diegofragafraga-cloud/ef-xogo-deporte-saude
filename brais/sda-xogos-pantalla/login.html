<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso · SdA Xogos vs Pantalla</title>
<style>
  :root {
    --bg: #0b0d13; --bg2: #13161f; --bg3: #1c2030;
    --text: #e8eaf0; --text2: #8b92a8; --accent: #3b82f6;
    --border: #252a3a; --radius: 16px; --red: #f87171;
  }
  .light {
    --bg: #f0f2f7; --bg2: #ffffff; --bg3: #e8eaf0;
    --text: #13161f; --text2: #6b7280; --border: #d1d5db;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .header {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 24px; background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; transition: all .2s; flex-shrink: 0;
  }
  .back-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .back-btn svg { width: 18px; height: 18px; }
  .header h1 { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #fff; font-size: 1rem;
  }
  .hidden { display: none !important; }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 200;
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .theme-toggle:hover { background: var(--accent); color: #fff; }
  .theme-toggle svg { width: 16px; height: 16px; }

  .login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 80px); padding: 24px;
  }
  .login-box {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 40px 32px; width: 380px; max-width: 100%; text-align: center;
  }
  .login-avatar {
    width: 64px; height: 64px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: #fff; margin: 0 auto 16px;
  }
  .login-avatar svg { width: 30px; height: 30px; }
  .login-box h2 { font-size: 1.1rem; margin-bottom: 4px; }
  .login-box .login-sub { font-size: .8rem; color: var(--text2); margin-bottom: 20px; }
  .login-box input[type="password"] {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 12px 16px; border-radius: 10px; font-size: .95rem; width: 100%;
    margin-bottom: 12px; text-align: center;
  }
  .login-box input[type="password"]:focus { outline: none; border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font-weight: 700; font-size: .9rem;
    cursor: pointer; transition: filter .2s;
  }
  .login-btn:hover { filter: brightness(1.15); }
  .login-error {
    color: var(--red); font-size: .8rem; margin-top: 8px; min-height: 1.2em;
  }
  .lock-icon { margin-bottom: 12px; }
  .lock-icon svg { width: 28px; height: 28px; color: var(--text2); }
</style>
</head>
<body>
<script>
// Se xa hai sesión activa, saltar directamente á SdA
if (sessionStorage.getItem('brais_auth') === 'true') location.replace('./index.html');
</script>

<button class="theme-toggle" onclick="document.body.classList.toggle('light');localStorage.setItem('ef_theme',document.body.classList.contains('light')?'light':'dark');document.getElementById('m').classList.toggle('hidden');document.getElementById('s').classList.toggle('hidden')">
  <svg id="m" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  <svg id="s" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
</button>

<div class="header">
  <a class="back-btn" href="../index.html" title="Volver ao espazo de Brais">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
  </a>
  <h1><div class="avatar">B</div> Acceso · SdA Xogos vs Pantalla</h1>
</div>

<div class="login-screen">
  <div class="login-box">
    <div class="login-avatar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <h2>SdA Xogos vs Pantalla</h2>
    <p class="login-sub">Introduce o contrasinal para acceder</p>
    <div class="lock-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <input type="password" id="pwd" placeholder="Contrasinal..." onkeydown="if(event.key==='Enter')login()" autofocus>
    <button class="login-btn" onclick="login()">Acceder</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<script>
const PASSWORD = 'brais2026';

function login() {
  const input = document.getElementById('pwd').value;
  if (input === PASSWORD) {
    sessionStorage.setItem('brais_auth', 'true');
    location.replace('./index.html');
  } else {
    document.getElementById('loginError').textContent = 'Contrasinal incorrecta';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

// Tema
if(localStorage.getItem('ef_theme')==='light'){document.body.classList.add('light');document.getElementById('m').classList.add('hidden');document.getElementById('s').classList.remove('hidden')}
</script>
</body>
</html>
