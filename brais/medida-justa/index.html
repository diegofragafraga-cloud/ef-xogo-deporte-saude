<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📏 La Medida Justa</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #1B4F72;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }

  #gr { width: 100%; height: 100vh; display: flex; flex-direction: column; }

  .gh {
    position: relative;
    background: #1B4F72; color: #fff;
    padding: 14px 40px; text-align: center; flex-shrink: 0;
  }
  .gh-title { font-size: clamp(24px, 3.5vw, 46px); font-weight: 800; letter-spacing: 2px; }
  .gh-sub   { font-size: clamp(13px, 1.6vw, 20px); opacity: 0.85; margin-top: 4px; }

  .home-btn {
    position: absolute;
    top: 50%; right: clamp(10px, 1.5vw, 24px);
    transform: translateY(-50%);
    width: clamp(40px, 5vw, 56px); height: clamp(40px, 5vw, 56px);
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    color: #fff; border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .home-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-50%) scale(1.05); }
  .home-btn svg { width: clamp(20px, 2.5vw, 28px); height: clamp(20px, 2.5vw, 28px); }

  .gp {
    background: #154360; padding: 8px 40px;
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .gp-bar  { flex: 1; background: rgba(255,255,255,0.2); border-radius: 20px; height: 16px; overflow: hidden; }
  .gp-fill { background: #F39C12; height: 100%; border-radius: 20px; width: 0%; transition: width 0.5s ease; }
  .gp-score { color: #fff; font-size: clamp(15px, 1.8vw, 24px); font-weight: 700; min-width: 110px; text-align: right; }

  .gc {
    flex: 1; background: #FFF9F2;
    padding: clamp(14px, 2vw, 30px) clamp(16px, 3vw, 50px);
    overflow-y: auto;
  }
  .inner { max-width: 1100px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; justify-content: center; }

  .host-msg {
    background: #EAF4FF; border-left: 5px solid #2471A3;
    padding: clamp(10px, 1.5vw, 18px) clamp(14px, 2vw, 22px);
    border-radius: 0 12px 12px 0; font-size: clamp(15px, 1.8vw, 24px);
    color: #154360; line-height: 1.5; margin-bottom: clamp(12px, 2vw, 22px);
  }
  .obj-box {
    background: #fff; border: 3px solid #C5DFF8; border-radius: 22px;
    padding: clamp(18px, 2.5vw, 30px); text-align: center;
    margin-bottom: clamp(14px, 2vw, 22px);
  }
  .obj-em { font-size: clamp(80px, 13vw, 180px); line-height: 1; display: block; margin-bottom: 12px; }
  .obj-nm { font-size: clamp(20px, 2.5vw, 36px); font-weight: 800; color: #1B4F72; }

  .q-text {
    font-size: clamp(18px, 2.4vw, 32px); font-weight: 700; color: #2C3E50;
    text-align: center; margin-bottom: clamp(14px, 2vw, 24px); line-height: 1.4;
  }
  .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: clamp(10px, 1.2vw, 16px); }
  .ans-btn {
    color: #fff; border: none;
    padding: clamp(14px, 1.7vw, 22px) clamp(10px, 1.2vw, 16px);
    border-radius: 16px; font-size: clamp(17px, 2vw, 28px); font-weight: 700;
    cursor: pointer; text-align: center; border-bottom: 6px solid rgba(0,0,0,0.22);
    transition: transform 0.08s; line-height: 1.3;
  }
  .ans-btn:hover { filter: brightness(1.1); }
  .ans-btn:active { transform: translateY(3px); border-bottom-width: 3px; }
  .q-counter { text-align: center; margin-top: 14px; font-size: clamp(13px, 1.4vw, 20px); color: #999; }

  /* Medida Justa: input numérico + selector de unidad */
  .mx-input-wrap {
    display: flex; gap: clamp(10px, 1.5vw, 18px); align-items: center;
    justify-content: center; margin-bottom: clamp(14px, 2vw, 24px); flex-wrap: wrap;
  }
  .mx-input {
    width: clamp(140px, 22vw, 280px);
    font-size: clamp(28px, 4vw, 56px); font-weight: 800;
    padding: clamp(10px, 1.4vw, 20px) clamp(14px, 2vw, 24px);
    border: 4px solid #2471A3; border-radius: 16px; text-align: center;
    color: #1B4F72; background: #fff;
    -moz-appearance: textfield;
  }
  .mx-input::-webkit-outer-spin-button,
  .mx-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .mx-input:focus { outline: none; border-color: #F39C12; }
  .mx-unit-toggle { display: flex; gap: 8px; }
  .mx-unit-btn {
    background: #fff; color: #2471A3; border: 3px solid #2471A3;
    padding: clamp(10px, 1.4vw, 18px) clamp(18px, 2.5vw, 32px);
    border-radius: 14px; font-size: clamp(20px, 2.6vw, 32px); font-weight: 800; cursor: pointer;
  }
  .mx-unit-btn.active { background: #2471A3; color: #fff; }
  .mx-submit-wrap { text-align: center; }
  .mx-submit {
    background: #8E44AD; color: #fff; border: none;
    padding: clamp(14px, 1.8vw, 24px) clamp(36px, 5vw, 72px);
    border-radius: 32px; font-size: clamp(20px, 2.8vw, 36px); font-weight: 800;
    cursor: pointer; border-bottom: 6px solid #6C3483;
  }
  .mx-submit:hover { filter: brightness(1.1); }
  .mx-submit:disabled { background: #ccc; border-bottom-color: #999; cursor: not-allowed; }

  /* Feedback */
  .fb-wrap { text-align: center; padding: clamp(10px, 2vw, 30px); }
  .fb-em    { font-size: clamp(72px, 11vw, 150px); line-height: 1; display: block; margin-bottom: 14px; }
  .fb-title { font-size: clamp(22px, 3.4vw, 50px); font-weight: 800; margin-bottom: 14px; }
  .fb-msg   {
    font-size: clamp(15px, 1.8vw, 26px); color: #444;
    margin-bottom: clamp(18px, 2.5vw, 32px); line-height: 1.6;
    padding: clamp(12px, 1.8vw, 22px); background: rgba(0,0,0,0.04); border-radius: 14px;
  }

  /* Feedback Medida Justa */
  .mxfb-line { font-size: clamp(16px, 2vw, 28px); margin: 8px 0; line-height: 1.5; }
  .mxfb-real { color: #1E8449; font-weight: 700; }
  .mxfb-yours { color: #2471A3; font-weight: 700; }
  .mxfb-diff-up { color: #C0392B; font-weight: 700; }
  .mxfb-diff-down { color: #2980B9; font-weight: 700; }
  .mxfb-exact { color: #1E8449; font-weight: 700; }
  .mxfb-pts { font-size: clamp(22px, 3vw, 40px); font-weight: 800; color: #F39C12; margin-top: 14px; }

  .next-btn {
    background: #2471A3; color: #fff; border: none;
    padding: clamp(13px, 1.5vw, 22px) clamp(32px, 5vw, 70px);
    border-radius: 34px; font-size: clamp(18px, 2.5vw, 32px);
    font-weight: 700; cursor: pointer; border-bottom: 5px solid #1A5276;
  }
  .next-btn:hover { filter: brightness(1.1); }

  /* Pantalla inicio */
  .start-wrap { text-align: center; padding: 10px; }
  .start-em   { font-size: clamp(60px, 9vw, 110px); display: block; margin-bottom: 10px; }
  .start-h    { font-size: clamp(22px, 3.6vw, 46px); font-weight: 800; color: #1B4F72; margin-bottom: 18px; }
  .start-section-label {
    font-size: clamp(14px, 1.6vw, 22px); font-weight: 700; color: #555;
    text-transform: uppercase; letter-spacing: 2px; margin: clamp(10px, 1.5vw, 18px) 0 8px;
  }
  .opt-row { display: flex; gap: clamp(8px, 1.5vw, 18px); justify-content: center; flex-wrap: wrap; margin-bottom: clamp(8px, 1vw, 14px); }
  .opt-btn {
    background: #fff; border: 3px solid #C5DFF8; color: #1B4F72;
    padding: clamp(10px, 1.5vw, 20px) clamp(14px, 2vw, 28px);
    border-radius: 18px; font-size: clamp(15px, 2vw, 26px); font-weight: 800;
    cursor: pointer; transition: all 0.15s;
    min-width: clamp(110px, 14vw, 180px);
  }
  .opt-btn:hover { transform: translateY(-2px); }
  .opt-btn.active { background: #2471A3; color: #fff; border-color: #1A5276; }
  .opt-btn[data-mode="medida"].active { background: #8E44AD; border-color: #6C3483; }
  .opt-btn[data-lvl="1"].active { background: #27AE60; border-color: #1E8449; }
  .opt-btn[data-lvl="2"].active { background: #F39C12; border-color: #D68910; }
  .opt-btn[data-lvl="3"].active { background: #C0392B; border-color: #922B21; }
  .start-btn  {
    background: #27AE60; color: #fff; border: none;
    padding: clamp(14px, 1.8vw, 24px) clamp(40px, 6vw, 90px);
    border-radius: 38px; font-size: clamp(20px, 3vw, 40px);
    font-weight: 800; cursor: pointer; border-bottom: 6px solid #1E8449;
    margin-top: clamp(14px, 2vw, 24px);
  }
  .start-btn:hover:not(:disabled) { filter: brightness(1.1); }
  .start-btn:disabled { background: #bbb; border-bottom-color: #888; cursor: not-allowed; }

  /* Pantalla final */
  .final-wrap { text-align: center; padding: 20px; }
  .final-em   { font-size: clamp(72px, 12vw, 140px); display: block; margin-bottom: 14px; }
  .final-h    { font-size: clamp(26px, 4vw, 52px); font-weight: 800; color: #1B4F72; margin-bottom: 10px; }
  .final-stars{ font-size: clamp(40px, 6vw, 80px); margin-bottom: 12px; }
  .final-pts  { font-size: clamp(18px, 2.5vw, 34px); color: #555; margin-bottom: 10px; }
  .final-msg  { font-size: clamp(16px, 2vw, 28px); color: #27AE60; font-weight: 700; margin-bottom: 28px; }
  .replay-btn {
    background: #F39C12; color: #fff; border: none;
    padding: clamp(15px, 2vw, 26px) clamp(40px, 6vw, 90px);
    border-radius: 36px; font-size: clamp(20px, 3vw, 40px);
    font-weight: 800; cursor: pointer; border-bottom: 6px solid #D68910;
  }
  .replay-btn:hover { filter: brightness(1.1); }
</style>
</head>
<body>
<div id="gr">
  <div class="gh">
    <div class="gh-title">📏 ¡LA MEDIDA JUSTA! 🎬</div>
    <div class="gh-sub">El concurso de los centímetros y los metros</div>
    <button class="home-btn" id="homeBtn" title="Volver al inicio" aria-label="Volver al inicio">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
  </div>
  <div class="gp">
    <div class="gp-bar"><div class="gp-fill" id="pfill"></div></div>
    <div class="gp-score">⭐ <span id="pts">0</span> pts</div>
  </div>
  <div class="gc">
    <div class="inner">

      <!-- INICIO -->
      <div id="ss" class="start-wrap">
        <span class="start-em">📏🎮</span>
        <div class="start-h">¡Bienvenido/a al juego!</div>

        <div class="start-section-label">1️⃣ Elige modalidad</div>
        <div class="opt-row" id="modeRow">
          <button class="opt-btn" data-mode="quiz">🎯 Quiz</button>
          <button class="opt-btn" data-mode="medida">📏 Medida Justa</button>
        </div>

        <div class="start-section-label">2️⃣ Elige nivel</div>
        <div class="opt-row" id="lvlRow">
          <button class="opt-btn" data-lvl="1">🟢 Fácil</button>
          <button class="opt-btn" data-lvl="2">🟡 Medio</button>
          <button class="opt-btn" data-lvl="3">🔴 Difícil</button>
        </div>

        <button class="start-btn" id="startBtn" disabled>¡JUGAR! 🚀</button>
      </div>

      <!-- QUIZ -->
      <div id="qs" style="display:none;">
        <div class="host-msg" id="qhmsg"></div>
        <div class="obj-box">
          <span class="obj-em" id="qoem"></span>
          <div class="obj-nm" id="qonm"></div>
        </div>
        <div class="q-text" id="qtxt"></div>
        <div class="btn-grid" id="abg"></div>
        <div class="q-counter" id="qctr"></div>
      </div>

      <!-- MEDIDA JUSTA (input) -->
      <div id="ms" style="display:none;">
        <div class="host-msg" id="mhmsg"></div>
        <div class="obj-box">
          <span class="obj-em" id="moem"></span>
          <div class="obj-nm" id="monm"></div>
        </div>
        <div class="q-text">¿Cuánto crees que mide?</div>
        <div class="mx-input-wrap">
          <input type="number" id="mxInput" class="mx-input" placeholder="0" inputmode="decimal" step="any">
          <div class="mx-unit-toggle">
            <button class="mx-unit-btn active" data-unit="cm" id="uCm">cm</button>
            <button class="mx-unit-btn" data-unit="m" id="uM">m</button>
          </div>
        </div>
        <div class="mx-submit-wrap">
          <button class="mx-submit" id="mxSubmit" disabled>¡Esa es mi medida!</button>
        </div>
        <div class="q-counter" id="mctr"></div>
      </div>

      <!-- FEEDBACK QUIZ -->
      <div id="fs" style="display:none;" class="fb-wrap">
        <span class="fb-em" id="fem"></span>
        <div class="fb-title" id="ftit"></div>
        <div class="fb-msg" id="fmsg"></div>
        <button class="next-btn" id="nextBtn">Seguir ➡️</button>
      </div>

      <!-- FEEDBACK MEDIDA -->
      <div id="mfs" style="display:none;" class="fb-wrap">
        <span class="fb-em" id="mfem"></span>
        <div class="fb-title" id="mftit"></div>
        <div class="fb-msg">
          <div class="mxfb-line">📐 La medida real: <span class="mxfb-real" id="mfReal"></span></div>
          <div class="mxfb-line">✍️ Tu respuesta: <span class="mxfb-yours" id="mfYours"></span></div>
          <div class="mxfb-line" id="mfDirLine"></div>
          <div class="mxfb-pts" id="mfPts"></div>
        </div>
        <button class="next-btn" id="mNextBtn">Seguir ➡️</button>
      </div>

      <!-- FINAL -->
      <div id="fin" style="display:none;" class="final-wrap">
        <span class="final-em" id="fnem"></span>
        <div class="final-h">¡Fin del juego!</div>
        <div class="final-stars" id="fnst"></div>
        <div class="final-pts" id="fnpts"></div>
        <div class="final-msg" id="fnmsg"></div>
        <button class="replay-btn" id="replayBtn">¡Otra vez! 🔄</button>
      </div>

    </div>
  </div>
</div>

<script>
// ======================== BANCO DE OBJETOS ========================
// Cada objeto: o=emoji, n=nombre, lvl=nivel, real={v,u}=medida exacta,
//              quiz={q,opts,a,ex}=datos del quiz para ese nivel.
// Las conversiones (lvl 3) no llevan `real` -> no aparecen en Medida Justa.
const BANK = [
  // ============ NIVEL 1 (FÁCIL): cm-vs-m  o  más/menos de 1 metro ============
  { o:'✏️', n:'El lápiz', lvl:1, real:{v:18,u:'cm'},
    quiz:{ q:'¿El lápiz se mide en cm o en metros?', opts:['cm','metros'], a:'cm',
           ex:'Un lápiz mide unos 18 cm. ¡Lo medimos en centímetros!' } },
  { o:'🚪', n:'La puerta', lvl:1, real:{v:2,u:'m'},
    quiz:{ q:'¿La puerta se mide en cm o en metros?', opts:['cm','metros'], a:'metros',
           ex:'¡La puerta es muy grande! Mide unos 2 metros de alto.' } },
  { o:'🍎', n:'La manzana', lvl:1, real:{v:8,u:'cm'},
    quiz:{ q:'¿Una manzana mide más o menos de 1 metro?', opts:['Más de 1 metro 📏','Menos de 1 metro 👌'], a:'Menos de 1 metro 👌',
           ex:'¡Una manzana es pequeña! Solo unos 8 cm.' } },
  { o:'🐜', n:'La hormiga', lvl:1, real:{v:1,u:'cm'},
    quiz:{ q:'¿La hormiga se mide en cm o en metros?', opts:['cm','metros'], a:'cm',
           ex:'¡Las hormigas son muy pequeñitas! Solo 1 cm.' } },
  { o:'📚', n:'El libro', lvl:1, real:{v:25,u:'cm'},
    quiz:{ q:'¿El libro se mide en cm o en metros?', opts:['cm','metros'], a:'cm',
           ex:'Un libro mide unos 25 cm.' } },
  { o:'🚌', n:'El autobús escolar', lvl:1, real:{v:12,u:'m'},
    quiz:{ q:'¿El autobús se mide en cm o en metros?', opts:['cm','metros'], a:'metros',
           ex:'¡El autobús es muy largo! Unos 12 metros.' } },
  { o:'🦒', n:'La jirafa', lvl:1, real:{v:5,u:'m'},
    quiz:{ q:'¿Una jirafa mide más o menos de 1 metro?', opts:['Más de 1 metro 📏','Menos de 1 metro 👌'], a:'Más de 1 metro 📏',
           ex:'¡Las jirafas son altísimas! Unos 5 metros.' } },
  { o:'🛏️', n:'La cama', lvl:1, real:{v:2,u:'m'},
    quiz:{ q:'¿La cama se mide en cm o en metros?', opts:['cm','metros'], a:'metros',
           ex:'Una cama mide unos 2 metros de larga.' } },
  { o:'👍', n:'El pulgar', lvl:1, real:{v:5,u:'cm'},
    quiz:{ q:'¿Tu pulgar mide más o menos de 1 metro?', opts:['Más de 1 metro 📏','Menos de 1 metro 👌'], a:'Menos de 1 metro 👌',
           ex:'Tu pulgar mide unos 5 cm. ¡Mucho menos que 1 metro!' } },
  { o:'🏠', n:'La casa', lvl:1, real:{v:7,u:'m'},
    quiz:{ q:'¿La casa se mide en cm o en metros?', opts:['cm','metros'], a:'metros',
           ex:'Una casa mide unos 7 metros de alto.' } },
  { o:'📏', n:'La regla del cole', lvl:1, real:{v:30,u:'cm'},
    quiz:{ q:'¿La regla del cole mide más o menos de 1 metro?', opts:['Más de 1 metro 📏','Menos de 1 metro 👌'], a:'Menos de 1 metro 👌',
           ex:'¡La regla del cole mide 30 cm!' } },
  { o:'🐱', n:'El gato', lvl:1, real:{v:50,u:'cm'},
    quiz:{ q:'¿Un gato mide más o menos de 1 metro?', opts:['Más de 1 metro 📏','Menos de 1 metro 👌'], a:'Menos de 1 metro 👌',
           ex:'Un gato mide unos 50 cm de largo.' } },
  { o:'🦷', n:'El diente', lvl:1, real:{v:2,u:'cm'},
    quiz:{ q:'¿El diente se mide en cm o en metros?', opts:['cm','metros'], a:'cm',
           ex:'Los dientes son pequeños. ¡Unos 2 cm!' } },
  { o:'🪑', n:'La silla del cole', lvl:1, real:{v:80,u:'cm'},
    quiz:{ q:'¿La silla mide más o menos de 1 metro?', opts:['Más de 1 metro 📏','Menos de 1 metro 👌'], a:'Menos de 1 metro 👌',
           ex:'La silla del cole mide unos 80 cm.' } },
  { o:'🧸', n:'El osito de peluche', lvl:1, real:{v:30,u:'cm'},
    quiz:{ q:'¿Un osito mide más o menos de 1 metro?', opts:['Más de 1 metro 📏','Menos de 1 metro 👌'], a:'Menos de 1 metro 👌',
           ex:'Un osito mide unos 30 cm.' } },
  { o:'🖊️', n:'El bolígrafo', lvl:1, real:{v:14,u:'cm'},
    quiz:{ q:'¿El bolígrafo se mide en cm o en metros?', opts:['cm','metros'], a:'cm',
           ex:'Un boli mide unos 14 cm.' } },
  { o:'🐘', n:'El elefante', lvl:1, real:{v:3,u:'m'},
    quiz:{ q:'¿Un elefante mide más o menos de 1 metro?', opts:['Más de 1 metro 📏','Menos de 1 metro 👌'], a:'Más de 1 metro 📏',
           ex:'¡Los elefantes miden unos 3 metros!' } },
  { o:'🐛', n:'El gusano', lvl:1, real:{v:5,u:'cm'},
    quiz:{ q:'¿El gusano se mide en cm o en metros?', opts:['cm','metros'], a:'cm',
           ex:'Un gusano pequeño mide unos 5 cm.' } },
  { o:'🐞', n:'La mariquita', lvl:1, real:{v:1,u:'cm'},
    quiz:{ q:'¿La mariquita se mide en cm o en metros?', opts:['cm','metros'], a:'cm',
           ex:'¡Las mariquitas son pequeñitas! Solo 1 cm.' } },
  { o:'🚂', n:'El tren', lvl:1, real:{v:200,u:'m'},
    quiz:{ q:'¿Un tren se mide en cm o en metros?', opts:['cm','metros'], a:'metros',
           ex:'¡Un tren entero mide unos 200 metros!' } },
  { o:'🍌', n:'El plátano', lvl:1, real:{v:18,u:'cm'},
    quiz:{ q:'¿Un plátano mide más o menos de 1 metro?', opts:['Más de 1 metro 📏','Menos de 1 metro 👌'], a:'Menos de 1 metro 👌',
           ex:'¡Un plátano mide unos 18 cm!' } },
  { o:'🌳', n:'El árbol del patio', lvl:1, real:{v:8,u:'m'},
    quiz:{ q:'¿Un árbol grande se mide en cm o en metros?', opts:['cm','metros'], a:'metros',
           ex:'Un árbol grande mide unos 8 metros de alto.' } },

  // ============ NIVEL 2 (MEDIO): 4 opciones bien separadas ============
  { o:'🎒', n:'La mochila', lvl:2, real:{v:40,u:'cm'},
    quiz:{ q:'¿Cuánto mide una mochila?', opts:['5 cm','40 cm','2 metros','10 metros'], a:'40 cm',
           ex:'Una mochila mide unos 40 cm de alto.' } },
  { o:'🚗', n:'El coche', lvl:2, real:{v:4,u:'m'},
    quiz:{ q:'¿Cuánto mide un coche?', opts:['50 cm','1 metro','4 metros','20 metros'], a:'4 metros',
           ex:'Un coche mide unos 4 metros de largo.' } },
  { o:'🚲', n:'La bicicleta', lvl:2, real:{v:1.5,u:'m'},

// ======================== CONFIG ========================
const COLORS = ['#2471A3','#1E8449','#D35400','#6C3483','#C0392B','#117A65','#1A5276','#784212'];
const HOSTS_QUIZ = [
  '🎤 ¡Hola! Soy Mateo. Mira bien el objeto...',
  '🌟 ¡Siguiente! Piensa con calma...',
  '💪 ¡Tú puedes! Fíjate en el tamaño...',
  '🎯 ¡Atentos a esta!',
  '🚀 ¡Vamos genial! Seguimos...',
  '😊 ¡A mitad de camino!',
  '🏆 ¡Cada vez te sale mejor!',
  '⭐ ¡Casi al final! ¡Ánimo!',
  '🎊 ¡Penúltima! ¡A por ella!',
  '🏁 ¡ÚLTIMA PREGUNTA! ¡A darlo todo!'
];
const HOSTS_MEDIDA = [
  '🎬 ¡Bienvenidos a "La Medida Justa"! ¿Cuánto mide?',
  '📏 ¡Atención! Estima la medida con cuidado...',
  '🎯 ¡Vamos a por la medida exacta!',
  '🤔 Piénsalo bien antes de responder...',
  '🏁 ¡Última ronda! ¡A por la medida justa!'
];

// ======================== ESTADO ========================
const state = {
  mode: null,       // 'quiz' o 'medida'
  lvl: null,        // 1, 2, 3
  questions: [],
  current: 0,
  score: 0,
  total: 10,
  unit: 'cm'        // unidad seleccionada en Medida Justa
};

// ======================== UTILIDADES ========================
const $ = id => document.getElementById(id);
const shuffle = a => [...a].sort(() => Math.random() - 0.5);
const SCREENS = ['ss','qs','ms','fs','mfs','fin'];
function show(id) { SCREENS.forEach(x => $(x).style.display = (x === id ? 'block' : 'none')); }
function toCm(v, u) { return u === 'm' ? v * 100 : v; }
// Formato con coma decimal (estilo español) y sin decimales redundantes
function fmtMeasure(v, u) {
  const s = (Math.round(v * 100) / 100).toString().replace('.', ',');
  return s + ' ' + u;
}
function updateProgress() {
  $('pfill').style.width = Math.round((state.current / state.total) * 100) + '%';
  $('pts').textContent = state.score;
}
function clearChildren(el) { while (el.firstChild) el.removeChild(el.firstChild); }

// ======================== INICIO: SELECTORES ========================
function setupStart() {
  $('modeRow').querySelectorAll('.opt-btn').forEach(b => {
    b.addEventListener('click', () => {
      $('modeRow').querySelectorAll('.opt-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      state.mode = b.dataset.mode;
      checkStartReady();
    });
  });
  $('lvlRow').querySelectorAll('.opt-btn').forEach(b => {
    b.addEventListener('click', () => {
      $('lvlRow').querySelectorAll('.opt-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      state.lvl = parseInt(b.dataset.lvl, 10);
      checkStartReady();
    });
  });
  $('startBtn').addEventListener('click', startGame);
}

function checkStartReady() {
  $('startBtn').disabled = !(state.mode && state.lvl);
}

// ======================== ARRANQUE PARTIDA ========================
function startGame() {
  state.current = 0;
  state.score = 0;
  if (state.mode === 'quiz') {
    const pool = BANK.filter(o => o.lvl === state.lvl && o.quiz);
    state.total = Math.min(10, pool.length);
    state.questions = shuffle(pool).slice(0, state.total);
    updateProgress();
    show('qs'); renderQuiz();
  } else {
    const pool = BANK.filter(o => o.lvl === state.lvl && o.real);
    state.total = Math.min(5, pool.length);
    state.questions = shuffle(pool).slice(0, state.total);
    updateProgress();
    show('ms'); renderMedida();
  }
}

// ======================== QUIZ ========================
function renderQuiz() {
  const q = state.questions[state.current];
  $('qhmsg').textContent = HOSTS_QUIZ[state.current] || '🎤 ¡Vamos allá!';
  $('qoem').textContent = q.o;
  $('qonm').textContent = q.n;
  $('qtxt').textContent = q.quiz.q;
  $('qctr').textContent = 'Pregunta ' + (state.current + 1) + ' de ' + state.total;
  const cols = shuffle(COLORS);
  const grid = $('abg');
  clearChildren(grid);
  q.quiz.opts.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'ans-btn';
    b.textContent = opt;
    b.style.background = cols[i % cols.length];
    b.addEventListener('click', () => onQuizAnswer(opt, q));
    grid.appendChild(b);
  });
}

function onQuizAnswer(sel, q) {
  const ok = sel === q.quiz.a;
  if (ok) state.score += 10;
  $('fem').textContent = ok ? ['🎉','⭐','🏆','✅','🥳','🌟'][Math.floor(Math.random()*6)] : '💪';
  const tit = $('ftit');
  tit.textContent = ok ? '¡Correcto! ¡Muy bien!' : '¡Casi! La respuesta es: ' + q.quiz.a;
  tit.style.color = ok ? '#1E8449' : '#C0392B';

  // Construir feedback de quiz con DOM seguro: <strong>emoji nombre</strong><br>explicación
  const msg = $('fmsg');
  clearChildren(msg);
  const strong = document.createElement('strong');
  strong.textContent = q.o + ' ' + q.n;
  msg.appendChild(strong);
  msg.appendChild(document.createElement('br'));
  msg.appendChild(document.createTextNode(q.quiz.ex));

  state.current++;
  updateProgress();
  show('fs');
}

// ======================== MEDIDA JUSTA ========================
function renderMedida() {
  const q = state.questions[state.current];
  $('mhmsg').textContent = HOSTS_MEDIDA[state.current] || '📏 ¡A estimar!';
  $('moem').textContent = q.o;
  $('monm').textContent = q.n;
  $('mxInput').value = '';
  $('mxSubmit').disabled = true;
  state.unit = 'cm';
  $('uCm').classList.add('active');
  $('uM').classList.remove('active');
  $('mctr').textContent = 'Ronda ' + (state.current + 1) + ' de ' + state.total;
  $('mxInput').focus();
}

function onMedidaSubmit() {
  const raw = parseFloat($('mxInput').value.replace(',', '.'));
  if (isNaN(raw) || raw <= 0) return;
  const q = state.questions[state.current];

  // Convertimos todo a cm para comparar (la unidad real puede ser distinta)
  const userCm = toCm(raw, state.unit);
  const realCm = toCm(q.real.v, q.real.u);
  const errorPct = Math.abs(userCm - realCm) / realCm * 100;

  // Puntos según error
  let pts, mensaje, emoji, color;
  if (errorPct <= 5)       { pts = 100; mensaje = '¡LA MEDIDA JUSTA!'; emoji = '🎯'; color = '#1E8449'; }
  else if (errorPct <= 15) { pts = 60;  mensaje = '¡Casi justo!';      emoji = '🌟'; color = '#27AE60'; }
  else if (errorPct <= 30) { pts = 30;  mensaje = 'Por ahí ronda';     emoji = '👍'; color = '#F39C12'; }
  else                     { pts = 0;   mensaje = 'Frío frío';         emoji = '❄️'; color = '#2980B9'; }
  state.score += pts;

  $('mfem').textContent = emoji;
  const tit = $('mftit');
  tit.textContent = mensaje;
  tit.style.color = color;
  $('mfReal').textContent = fmtMeasure(q.real.v, q.real.u);
  $('mfYours').textContent = fmtMeasure(raw, state.unit);

  // Línea de dirección del error: ¿te has pasado, te has quedado corto, o casi exacto?
  const dirLine = $('mfDirLine');
  clearChildren(dirLine);
  const diffCm = Math.abs(userCm - realCm);
  if (errorPct <= 1) {
    const span = document.createElement('span');
    span.className = 'mxfb-exact';
    span.textContent = '✅ ¡Acertaste casi al milímetro!';
    dirLine.appendChild(span);
  } else if (userCm > realCm) {
    const span = document.createElement('span');
    span.className = 'mxfb-diff-up';
    span.textContent = '⬆️ ¡Te has pasado!';
    dirLine.appendChild(span);
    dirLine.appendChild(document.createTextNode(' por ' + fmtMeasure(diffCm, 'cm')));
  } else {
    const span = document.createElement('span');
    span.className = 'mxfb-diff-down';
    span.textContent = '⬇️ ¡Te has quedado corto/a!';
    dirLine.appendChild(span);
    dirLine.appendChild(document.createTextNode(' por ' + fmtMeasure(diffCm, 'cm')));
  }
  $('mfPts').textContent = '+ ' + pts + ' puntos';

  state.current++;
  updateProgress();
  show('mfs');
}

// ======================== AVANCE / FINAL ========================
function advance() {
  const isQuiz = state.mode === 'quiz';
  if (state.current >= state.total) {
    $('pfill').style.width = '100%';
    const max = state.total * (isQuiz ? 10 : 100);
    const pct = state.score / max;
    let em, st, msg;
    if (pct >= 0.9)      { em = '🏆'; st = '⭐⭐⭐'; msg = '¡Eres un campeón/a de las medidas!'; }
    else if (pct >= 0.7) { em = '🌟'; st = '⭐⭐';  msg = '¡Lo hiciste genial! Sigue practicando.'; }
    else if (pct >= 0.5) { em = '😊'; st = '⭐';    msg = '¡Bien! Con práctica serás un experto/a.'; }
    else                 { em = '💪'; st = '✊';   msg = '¡Inténtalo otra vez! ¡Tú puedes!'; }
    $('fnem').textContent = em;
    $('fnst').textContent = st;
    $('fnpts').textContent = 'Conseguiste ' + state.score + ' de ' + max + ' puntos';
    $('fnmsg').textContent = msg;
    show('fin');
  } else {
    if (isQuiz) { show('qs'); renderQuiz(); }
    else        { show('ms'); renderMedida(); }
  }
}

// ======================== EVENTOS ========================
document.addEventListener('DOMContentLoaded', () => {
  setupStart();

  $('nextBtn').addEventListener('click', advance);
  $('mNextBtn').addEventListener('click', advance);

  // Toggle unidad cm/m en Medida Justa
  $('uCm').addEventListener('click', () => { state.unit = 'cm'; $('uCm').classList.add('active'); $('uM').classList.remove('active'); });
  $('uM').addEventListener('click',  () => { state.unit = 'm';  $('uM').classList.add('active');  $('uCm').classList.remove('active'); });

  // Habilitar/deshabilitar submit según haya valor válido
  $('mxInput').addEventListener('input', () => {
    const v = parseFloat($('mxInput').value.replace(',', '.'));
    $('mxSubmit').disabled = isNaN(v) || v <= 0;
  });
  $('mxInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !$('mxSubmit').disabled) onMedidaSubmit();
  });
  $('mxSubmit').addEventListener('click', onMedidaSubmit);

  function goHome() {
    state.mode = null; state.lvl = null;
    state.current = 0; state.score = 0;
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
    $('startBtn').disabled = true;
    $('pfill').style.width = '0%';
    $('pts').textContent = '0';
    show('ss');
  }
  $('replayBtn').addEventListener('click', goHome);
  $('homeBtn').addEventListener('click', goHome);
});
</script>
