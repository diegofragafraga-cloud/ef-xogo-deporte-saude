<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lectoescritura · Shrek</title>
<style>
  /* ---- Paleta calma y alto contraste, pensada para TEA ---- */
  :root{
    --tinta:#1f2933;        /* texto principal, gris muy oscuro (menos duro que negro puro) */
    --fondo:#fffdf7;        /* crema suave, evita el deslumbramiento del blanco puro */
    --marco:#0d5c46;        /* verde Shrek para los bordes */
    --acento:#e9f7f0;       /* relleno verde clarito de las filas */
    --casilla:#0d5c46;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:"Arial Rounded MT Bold","Comic Sans MS","Trebuchet MS",Arial,sans-serif;
    color:var(--tinta);
    background:var(--fondo);
    padding:24px;
    line-height:1.3;
  }

  /* ---- Cabecera ---- */
  .cabecera{
    text-align:center;
    border:4px solid var(--marco);
    border-radius:18px;
    padding:16px 20px;
    margin-bottom:22px;
    background:var(--acento);
  }
  .cabecera h1{ font-size:30px; letter-spacing:1px; color:var(--marco); }
  .cabecera p{ font-size:18px; margin-top:6px; }
  .datos{
    display:flex; gap:24px; justify-content:center; margin-top:12px; font-size:17px;
  }
  .datos span{ border-bottom:2px dotted var(--tinta); padding:0 30px 2px 6px; }

  /* ---- Cada frase: imagen | texto | opciones ---- */
  .item{
    display:flex;
    align-items:center;
    gap:18px;
    border:3px solid var(--marco);
    border-radius:16px;
    padding:14px 18px;
    margin-bottom:16px;
    background:#fff;
    page-break-inside:avoid;          /* no partir una frase entre dos hojas */
  }
  .num{
    flex:0 0 auto;
    width:38px; height:38px;
    background:var(--marco); color:#fff;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:bold;
  }
  .icono{
    position:relative;             /* la imagen real se coloca ENCIMA del SVG */
    flex:0 0 auto;
    width:84px; height:84px;
    border:2px dashed #b9d8c9;     /* marco suave que indica "aquí va la imagen" */
    border-radius:12px;
    overflow:hidden;
    background:var(--acento);
  }
  .icono svg{ width:100%; height:100%; display:block; }
  .icono img{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    background:var(--acento);      /* tapa el SVG cuando la imagen sí existe */
  }

  .frase{
    flex:1 1 auto;
    font-size:24px;
    letter-spacing:0.5px;
  }
  .hueco{
    display:inline-block;
    min-width:120px;
    border-bottom:3px solid var(--tinta);
    margin:0 4px;
  }

  /* ---- Las dos opciones con casilla para marcar la X ---- */
  .opciones{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .opcion{
    display:flex; align-items:center; gap:10px;
    font-size:21px;
    border:2px solid var(--marco);
    border-radius:10px;
    padding:6px 12px 6px 8px;
    background:var(--acento);
  }
  .casilla{
    flex:0 0 auto;
    width:30px; height:30px;
    border:3px solid var(--casilla);
    border-radius:6px;
    background:#fff;
  }

  /* ---- Impresión A4 ---- */
  @media print{
    body{ padding:10mm; }
    .item{ margin-bottom:12px; }
    @page{ size:A4; margin:10mm; }
  }
</style>
</head>
<body>

  <div class="cabecera">
    <h1>¡A LEER CON SHREK!</h1>
    <p>LEE LA FRASE Y MARCA CON UNA <b>X</b> LA PALABRA CORRECTA</p>
    <div class="datos">
      <span>NOMBRE:</span>
      <span>FECHA:</span>
    </div>
  </div>

  <div id="ficha"></div>

<script>
/* ============================================================
   FRASES DE LA FICHA
   Brais: para añadir o cambiar frases solo edita esta lista.
   Cada frase tiene:
     icono   -> nombre del dibujo (ver la lista ICONOS de abajo)
     antes   -> texto antes del hueco
     despues -> texto después del hueco
     correcta / otra -> las dos opciones (la "correcta" es solo
                        una referencia para ti; en la ficha salen
                        en orden aleatorio para que el niño elija)
   ============================================================ */
const FRASES = [
  { icono:"ogro",     antes:"SHREK ES UN OGRO DE COLOR",  despues:".", correcta:"VERDE",  otra:"AZUL" },
  { icono:"pantano",  antes:"SHREK VIVE EN UNA",          despues:".", correcta:"CIÉNAGA", otra:"CUEVA" },
  { icono:"asno",     antes:"ASNO ES EL MEJOR",           despues:"DE SHREK.", correcta:"AMIGO", otra:"COCHE" },
  { icono:"princesa", antes:"LA PRINCESA SE LLAMA",       despues:".", correcta:"FIONA",   otra:"ANA" },
  { icono:"dragon",   antes:"EL DRAGÓN ECHA",             despues:"POR LA BOCA.", correcta:"FUEGO", otra:"AGUA" },
  { icono:"botas",    antes:"EL GATO LLEVA UNAS",         despues:".", correcta:"BOTAS",   otra:"GAFAS" },
  { icono:"cebolla",  antes:"SHREK DICE QUE SE PARECE A UNA", despues:".", correcta:"CEBOLLA", otra:"MANZANA" },
  { icono:"castillo", antes:"LA PRINCESA VIVE EN UN",     despues:".", correcta:"CASTILLO", otra:"GARAJE" },
  { icono:"asno",     antes:"EL ASNO TIENE CUATRO",       despues:".", correcta:"PATAS",   otra:"ALAS" },
  { icono:"barro",    antes:"A SHREK LE GUSTA EL BAÑO DE", despues:".", correcta:"BARRO",  otra:"LECHE" },
  { icono:"luna",     antes:"FIONA CAMBIA CUANDO SALE LA", despues:".", correcta:"LUNA",   otra:"NIEVE" },
  { icono:"corazon",  antes:"SHREK QUIERE MUCHO A",       despues:".", correcta:"FIONA",   otra:"PEDRO" }
];

/* ============================================================
   ICONOS  (SVG originales y sencillos, no personajes oficiales)
   ============================================================ */
const ICONOS = {
  ogro:`<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="34" fill="#6cae5a" stroke="#0d5c46" stroke-width="4"/><rect x="20" y="40" width="10" height="16" rx="5" fill="#6cae5a" stroke="#0d5c46" stroke-width="4"/><rect x="70" y="40" width="10" height="16" rx="5" fill="#6cae5a" stroke="#0d5c46" stroke-width="4"/><circle cx="40" cy="52" r="5" fill="#1f2933"/><circle cx="60" cy="52" r="5" fill="#1f2933"/><path d="M40 70 Q50 78 60 70" fill="none" stroke="#1f2933" stroke-width="4" stroke-linecap="round"/></svg>`,
  pantano:`<svg viewBox="0 0 100 100"><rect x="8" y="58" width="84" height="30" rx="8" fill="#3f8e6c" stroke="#0d5c46" stroke-width="4"/><path d="M20 58 q6 -10 0 -20" stroke="#0d5c46" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M30 58 q-6 -12 0 -24" stroke="#0d5c46" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M78 58 q6 -10 0 -22" stroke="#0d5c46" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M40 72 q6 4 12 0" stroke="#bfe6d2" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`,
  asno:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="62" rx="26" ry="24" fill="#a8a8a8" stroke="#1f2933" stroke-width="4"/><path d="M34 40 q-6 -22 4 -26 q8 4 6 24" fill="#a8a8a8" stroke="#1f2933" stroke-width="4"/><path d="M66 40 q6 -22 -4 -26 q-8 4 -6 24" fill="#a8a8a8" stroke="#1f2933" stroke-width="4"/><ellipse cx="50" cy="74" rx="13" ry="10" fill="#cfcfcf" stroke="#1f2933" stroke-width="3"/><circle cx="42" cy="60" r="4" fill="#1f2933"/><circle cx="58" cy="60" r="4" fill="#1f2933"/><circle cx="45" cy="74" r="2.5" fill="#1f2933"/><circle cx="55" cy="74" r="2.5" fill="#1f2933"/></svg>`,
  princesa:`<svg viewBox="0 0 100 100"><circle cx="50" cy="56" r="28" fill="#f6d2b6" stroke="#1f2933" stroke-width="4"/><path d="M28 38 L36 24 L44 36 L50 22 L56 36 L64 24 L72 38 Z" fill="#f4c64a" stroke="#1f2933" stroke-width="3"/><circle cx="41" cy="56" r="4" fill="#1f2933"/><circle cx="59" cy="56" r="4" fill="#1f2933"/><path d="M42 68 Q50 74 58 68" fill="none" stroke="#c0392b" stroke-width="4" stroke-linecap="round"/></svg>`,
  dragon:`<svg viewBox="0 0 100 100"><ellipse cx="46" cy="56" rx="26" ry="22" fill="#b65cc7" stroke="#5a2a66" stroke-width="4"/><path d="M30 40 l-6 -14 l16 8 z" fill="#b65cc7" stroke="#5a2a66" stroke-width="3"/><circle cx="40" cy="52" r="4.5" fill="#1f2933"/><path d="M70 56 q14 0 22 -6 q-6 8 -2 12 q-10 -2 -20 0z" fill="#f39c12" stroke="#e67e22" stroke-width="3"/></svg>`,
  botas:`<svg viewBox="0 0 100 100"><path d="M40 18 h16 v40 q22 4 22 22 v6 H34 q-8 0 -8 -10 V18z" fill="#6b3f1d" stroke="#1f2933" stroke-width="4"/><rect x="30" y="80" width="52" height="8" rx="4" fill="#3c2410" stroke="#1f2933" stroke-width="3"/><rect x="36" y="44" width="24" height="8" fill="#f4c64a" stroke="#1f2933" stroke-width="2"/></svg>`,
  cebolla:`<svg viewBox="0 0 100 100"><path d="M50 22 q26 8 26 38 q0 26 -26 26 q-26 0 -26 -26 q0 -30 26 -38z" fill="#e7d7a6" stroke="#9c7a3c" stroke-width="4"/><path d="M50 30 q12 16 0 52" stroke="#9c7a3c" stroke-width="3" fill="none"/><path d="M64 36 q8 20 -4 44" stroke="#9c7a3c" stroke-width="3" fill="none"/><path d="M36 36 q-8 20 4 44" stroke="#9c7a3c" stroke-width="3" fill="none"/><path d="M44 20 q6 -10 12 0" stroke="#6cae5a" stroke-width="4" fill="none" stroke-linecap="round"/></svg>`,
  castillo:`<svg viewBox="0 0 100 100"><rect x="22" y="44" width="56" height="40" fill="#cdbca0" stroke="#1f2933" stroke-width="4"/><path d="M22 44 v-10 h8 v6 h8 v-6 h8 v6 h8 v-6 h8 v6 h8 v-6 h8 v10z" fill="#cdbca0" stroke="#1f2933" stroke-width="3"/><rect x="44" y="60" width="14" height="24" rx="7" fill="#6b3f1d" stroke="#1f2933" stroke-width="3"/><path d="M51 30 l12 -8 v6 h-12z" fill="#c0392b" stroke="#1f2933" stroke-width="2"/></svg>`,
  barro:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="72" rx="36" ry="14" fill="#8a5a2b" stroke="#5a3a1a" stroke-width="4"/><path d="M14 60 q36 -16 72 0" fill="none" stroke="#5a3a1a" stroke-width="4"/><circle cx="38" cy="58" r="5" fill="#a8743c"/><circle cx="58" cy="56" r="6" fill="#a8743c"/><circle cx="50" cy="64" r="4" fill="#a8743c"/></svg>`,
  luna:`<svg viewBox="0 0 100 100"><path d="M62 22 a34 34 0 1 0 0 56 a26 26 0 0 1 0 -56z" fill="#f4d35e" stroke="#caa53a" stroke-width="4"/><circle cx="78" cy="26" r="2.5" fill="#caa53a"/><circle cx="84" cy="40" r="2" fill="#caa53a"/></svg>`,
  corazon:`<svg viewBox="0 0 100 100"><path d="M50 80 C20 58 16 36 32 28 C44 22 50 34 50 38 C50 34 56 22 68 28 C84 36 80 58 50 80z" fill="#e05a6e" stroke="#9c2a3c" stroke-width="4"/></svg>`
};

/* ---- Mezcla simple para que las dos opciones salgan en orden variable ---- */
function mezclar(a, b, semilla){
  return semilla % 2 === 0 ? [a, b] : [b, a];
}

/* ---- Pinta la ficha ---- */
const cont = document.getElementById("ficha");
FRASES.forEach((f, i) => {
  const ops = mezclar(f.correcta, f.otra, i);
  const numImg = String(i + 1).padStart(2, "0");   // 01, 02, 03...
  const div = document.createElement("div");
  div.className = "item";
  // Si existe imagenes/NN.jpg se muestra; si no, cae al icono SVG de respaldo.
  div.innerHTML = `
    <div class="num">${i + 1}</div>
    <div class="icono">
      ${ICONOS[f.icono] || ""}
      <img src="imagenes/${numImg}.jpg" alt="" onerror="this.remove()">
    </div>
    <div class="frase">${f.antes} <span class="hueco"></span> ${f.despues}</div>
    <div class="opciones">
      <div class="opcion"><span class="casilla"></span>${ops[0]}</div>
      <div class="opcion"><span class="casilla"></span>${ops[1]}</div>
    </div>`;
  cont.appendChild(div);
});
</script>
</body>
</html>
