<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letras Galegas 2026 · Modo interactivo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --c1: #1e3a8a; --c2: #3b82f6; --c3: #60a5fa;
    --warm: #f59e0b; --warm2: #fbbf24;
    --bg: #0b0d13;
    --text: #fff;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; user-select: none;
  }

  /* Top bar: barra de progreso + nº slide */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    padding: 14px 18px 0;
  }
  .progress-segments {
    display: flex; gap: 4px;
  }
  .seg {
    flex: 1; height: 3px; background: rgba(255,255,255,.18);
    border-radius: 2px; overflow: hidden;
  }
  .seg .fill {
    display: block; height: 100%; width: 0;
    background: #fff; transition: width .1s linear;
  }
  .seg.done .fill { width: 100% !important; }

  /* Header info */
  .header-info {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px; padding: 0 4px;
  }
  .header-left { display:flex; align-items:center; gap:10px; }
  .header-tag {
    background: rgba(255,255,255,.18); color: #fff;
    padding: 4px 10px; border-radius: 8px; font-size: .68rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
    backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.22);
  }
  .header-counter { font-size: .72rem; color: rgba(255,255,255,.6); font-weight: 600; }
  .header-right { display:flex; gap:6px; }
  .ctrl-btn {
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18);
    color: #fff; width: 32px; height: 32px; border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,.22); }
  .ctrl-btn svg { width: 14px; height: 14px; }
  .ctrl-btn.close { background: rgba(0,0,0,.4); }

  /* Stage */
  .stage {
    position: relative; width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 32px 90px; text-align: center;
    opacity: 0; transition: opacity .45s ease;
    pointer-events: none;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  /* Slide types */
  .slide-intro { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 60%, #f59e0b 130%); }
  .slide-info { background: linear-gradient(160deg, #0b0d13 0%, #13161f 50%, #1e3a8a 130%); }
  .slide-game { background: linear-gradient(170deg, #0b0d13 0%, #13161f 65%); }
  .slide-end { background: linear-gradient(135deg, #f59e0b 0%, #3b82f6 60%, #1e3a8a 130%); }

  .slide-intro::before, .slide-end::before {
    content:''; position:absolute; top:-100px; right:-100px;
    width:340px; height:340px; border-radius:50%;
    background: rgba(255,255,255,.08);
  }
  .slide-intro::after, .slide-end::after {
    content:''; position:absolute; bottom:-130px; left:-80px;
    width:280px; height:280px; border-radius:50%;
    background: rgba(255,255,255,.06);
  }

  /* Tipografía slides */
  .badge-up {
    background: rgba(255,255,255,.18); color: #fff;
    padding: 6px 14px; border-radius: 20px;
    font-size: .72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 22px;
    backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.22);
    position: relative; z-index: 1;
  }
  .title-xl { font-size: clamp(2rem, 6vw, 3.4rem); font-weight: 800; line-height: 1.05; margin-bottom: 16px; position: relative; z-index: 1; }
  .title-xl span { color: var(--warm2); }
  .subtitle { font-size: clamp(1rem, 2.2vw, 1.3rem); color: rgba(255,255,255,.9); max-width: 720px; line-height: 1.5; position: relative; z-index: 1; }

  .info-illust { width: 140px; height: 140px; margin-bottom: 28px; position: relative; z-index: 1; }
  .info-illust svg { width: 100%; height: 100%; }
  .info-title { font-size: clamp(1.6rem, 4.5vw, 2.4rem); font-weight: 800; margin-bottom: 14px; position: relative; z-index: 1; }
  .info-title span { color: var(--warm2); }
  .info-text { font-size: clamp(1rem, 2vw, 1.2rem); color: rgba(255,255,255,.88); max-width: 680px; line-height: 1.55; position: relative; z-index: 1; }

  /* Game slide layout */
  .game-num-big {
    font-size: 5rem; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, var(--c2), var(--warm));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px; position: relative; z-index: 1;
  }
  .game-illust {
    width: clamp(180px, 28vw, 280px);
    height: clamp(180px, 28vw, 280px);
    margin-bottom: 18px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    padding: 22px; position: relative; z-index: 1;
  }
  .game-illust svg { width: 100%; height: 100%; }
  .game-name { font-size: clamp(1.6rem, 4.5vw, 2.4rem); font-weight: 800; margin-bottom: 10px; position: relative; z-index: 1; }
  .game-name span { color: var(--warm2); }
  .game-desc { font-size: clamp(.95rem, 1.9vw, 1.1rem); color: rgba(255,255,255,.85); max-width: 600px; line-height: 1.5; margin-bottom: 14px; position: relative; z-index: 1; }
  .game-mat-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(245,158,11,.18); border: 1px solid rgba(245,158,11,.35);
    padding: 8px 16px; border-radius: 12px;
    font-size: .85rem; font-weight: 600; color: var(--warm2);
    position: relative; z-index: 1;
  }
  .game-mat-tag svg { width: 14px; height: 14px; }

  /* End slide CTA */
  .end-cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; color: #1e3a8a;
    padding: 14px 24px; border-radius: 14px;
    font-weight: 700; font-size: 1rem; text-decoration: none;
    margin-top: 24px; transition: transform .15s;
    position: relative; z-index: 1;
  }
  .end-cta:hover { transform: translateY(-2px); }
  .end-cta svg { width: 16px; height: 16px; }

  /* Touch zones for prev/next + click anywhere */
  .nav-zones {
    position: fixed; inset: 0; z-index: 30;
    display: flex; pointer-events: none;
  }
  .nav-zone { flex: 1; pointer-events: auto; cursor: pointer; }
  .nav-zone-left { flex: 0 0 30%; }
  .nav-zone-right { flex: 0 0 30%; }
  .nav-zone-center { flex: 1; }

  /* Hint at bottom */
  .hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 40; font-size: .72rem; color: rgba(255,255,255,.55);
    background: rgba(0,0,0,.35); padding: 8px 14px; border-radius: 20px;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.1);
    display: flex; align-items: center; gap: 8px;
    pointer-events: none;
    animation: fadeOut 5s ease forwards;
    animation-delay: 4s;
  }
  @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

  /* Animated entry per slide */
  .slide.active .anim-in {
    animation: slideUp .55s ease both;
  }
  .slide.active .anim-in.delay-1 { animation-delay: .12s; }
  .slide.active .anim-in.delay-2 { animation-delay: .24s; }
  .slide.active .anim-in.delay-3 { animation-delay: .36s; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .anim-in { opacity: 0; }

  /* Mobile tweaks */
  @media (max-width: 680px) {
    .slide { padding: 100px 22px 90px; }
    .topbar { padding: 12px 14px 0; }
    .header-tag { font-size: .62rem; padding: 3px 8px; }
    .game-num-big { font-size: 3.5rem; }
  }
</style>
</head>

// ====== Render ======
const stage = document.getElementById('stage');
const progress = document.getElementById('progress');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const btnPause = document.getElementById('btnPause');
const iconPause = document.getElementById('iconPause');
const iconPlay = document.getElementById('iconPlay');

function buildProgress() {
  progress.innerHTML = SLIDES.map(() => `<span class="seg"><span class="fill"></span></span>`).join('');
}

function buildSlides() {
  stage.innerHTML = SLIDES.map((s, i) => {
    if (s.type === 'intro') {
      return `<div class="slide slide-intro" data-i="${i}">
        <div class="badge-up anim-in">${s.badge}</div>
        <div class="title-xl anim-in delay-1">${s.title[0]}<br><span>${s.title[1]}</span></div>
        <div class="subtitle anim-in delay-2">${s.subtitle}</div>
      </div>`;
    }
    if (s.type === 'end') {
      return `<div class="slide slide-end" data-i="${i}">
        <div class="badge-up anim-in">${s.badge}</div>
        <div class="title-xl anim-in delay-1">${s.title[0]}</div>
        <div class="subtitle anim-in delay-2">${s.subtitle}</div>
        <a class="end-cta anim-in delay-3" href="letras-galegas-2026.html">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          Ver detalle e cronograma
        </a>
      </div>`;
    }
    if (s.type === 'info') {
      const titleHTML = s.title.length === 1
        ? s.title[0].replace(/(\d+\s\w+|guía|axente externo|na man)/i, m => `<span>${m}</span>`)
        : `${s.title[0]}<br><span>${s.title[1]}</span>`;
      return `<div class="slide slide-info" data-i="${i}">
        <div class="info-illust anim-in">${ILLUST[s.icon] || ''}</div>
        <div class="info-title anim-in delay-1">${titleHTML}</div>
        <div class="info-text anim-in delay-2">${s.text}</div>
      </div>`;
    }
    if (s.type === 'game') {
      return `<div class="slide slide-game" data-i="${i}">
        <div class="game-num-big anim-in">${String(s.num).padStart(2,'0')}</div>
        <div class="game-illust anim-in delay-1">${ILLUST[s.illust] || ''}</div>
        <div class="game-name anim-in delay-2">${s.name}</div>
        <div class="game-desc anim-in delay-2">${s.desc}</div>
        <div class="game-mat-tag anim-in delay-3">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          ${s.mat}
        </div>
      </div>`;
    }
  }).join('');
}

// ====== State machine ======
let currentIdx = 0;
let paused = false;
let elapsed = 0;
let lastTick = 0;
let rafId = null;
const segments = () => progress.querySelectorAll('.seg');
const slides = () => stage.querySelectorAll('.slide');

function show(i) {
  if (i < 0) i = 0;
  if (i >= SLIDES.length) { i = SLIDES.length - 1; }
  currentIdx = i;
  elapsed = 0;
  slides().forEach(el => el.classList.toggle('active', Number(el.dataset.i) === i));
  segments().forEach((seg, idx) => {
    seg.classList.toggle('done', idx < i);
    if (idx > i) seg.querySelector('.fill').style.width = '0%';
    if (idx === i) seg.querySelector('.fill').style.width = '0%';
  });
  counter.textContent = `${i + 1} / ${SLIDES.length}`;
}

function tick(t) {
  if (!paused) {
    if (!lastTick) lastTick = t;
    const dt = t - lastTick;
    lastTick = t;
    elapsed += dt;
    const dur = SLIDES[currentIdx].duration;
    const fill = segments()[currentIdx].querySelector('.fill');
    fill.style.width = Math.min(100, (elapsed / dur) * 100) + '%';
    if (elapsed >= dur) {
      if (currentIdx < SLIDES.length - 1) {
        show(currentIdx + 1);
      } else {
        // Fin: pausamos no último
        paused = true;
        iconPause.style.display = 'none';
        iconPlay.style.display = 'block';
      }
    }
  } else {
    lastTick = t;
  }
  rafId = requestAnimationFrame(tick);
}

function togglePause() {
  paused = !paused;
  iconPause.style.display = paused ? 'none' : 'block';
  iconPlay.style.display = paused ? 'block' : 'none';
  lastTick = 0;
}

function next() {
  if (currentIdx < SLIDES.length - 1) show(currentIdx + 1);
}
function prev() {
  if (currentIdx > 0) show(currentIdx - 1);
}

// ====== Controles ======
btnPrev.addEventListener('click', prev);
btnNext.addEventListener('click', next);
btnPause.addEventListener('click', togglePause);
document.getElementById('zonePrev').addEventListener('click', prev);
document.getElementById('zoneNext').addEventListener('click', next);
document.getElementById('zoneCenter').addEventListener('click', togglePause);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prev();
  else if (e.key === 'ArrowRight') next();
  else if (e.key === ' ') { e.preventDefault(); togglePause(); }
  else if (e.key === 'Escape') location.href = 'letras-galegas-2026.html';
});

// Inicio
buildProgress();
buildSlides();
show(0);
rafId = requestAnimationFrame(tick);
</script>
