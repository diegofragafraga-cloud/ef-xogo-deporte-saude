<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa da UE · Países</title>
<style>
  :root {
    --bg:#0b0d13; --bg2:#13161f; --bg3:#1c2030;
    --text:#e8eaf0; --text2:#8b92a8;
    --accent:#10b981; --accent2:#34d399;
    --border:#252a3a; --radius:14px;
    --country:#2a3347; --country-hover:#3a4565;
    --country-out:#181c28; --country-out-stroke:#252a3a;
    --found:rgba(16,185,129,.55); --found-stroke:#10b981;
    --correct:#10b981; --wrong:#ef4444; --hint:#f59e0b;
    --ocean:#0f131c;
    --eu:#003399; /* azul UE de fondo sutil */
  }
  .light {
    --bg:#f0f2f7; --bg2:#fff; --bg3:#e8eaf0;
    --text:#13161f; --text2:#6b7280; --border:#d1d5db;
    --country:#cbd5e1; --country-hover:#94a3b8;
    --country-out:#e5e7eb; --country-out-stroke:#d1d5db;
    --found:rgba(16,185,129,.45); --ocean:#dbeafe;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .hidden{display:none !important}

  .header{display:flex;align-items:center;gap:12px;padding:14px 22px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .back-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .2s;flex-shrink:0}
  .back-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .back-btn svg{width:18px;height:18px}
  .header h1{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:10px}
  .header-right{margin-left:auto;display:flex;gap:8px}
  .icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .icon-btn:hover{background:var(--accent);color:#fff}
  .icon-btn svg{width:16px;height:16px}

  .game-wrap{max-width:1400px;margin:0 auto;padding:10px 14px}

  .hud{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 18px;margin-bottom:8px}
  .hud-target{display:flex;align-items:baseline;gap:10px;flex:1;min-width:0}
  .hud-target small{font-size:.65rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1.4px;flex-shrink:0}
  .hud-target-name{font-size:1.4rem;font-weight:800;color:var(--accent2);line-height:1}
  .hud-stat{background:var(--bg3);padding:6px 12px;border-radius:8px;text-align:center;border:1px solid var(--border);display:flex;align-items:baseline;gap:6px}
  .hud-stat strong{font-size:1.05rem;color:var(--text)}
  .hud-stat .label{font-size:.62rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
  .hud-stat.ok strong{color:var(--accent2)}
  .hud-stat.bad strong{color:var(--wrong)}

  .map-container{background:var(--ocean);border:1px solid var(--border);border-radius:var(--radius);padding:6px;position:relative;overflow:hidden;height:calc(100vh - 175px);min-height:480px}
  #map{display:block;width:100%;height:100%;touch-action:manipulation}
  .country{fill:var(--country);stroke:var(--bg2);stroke-width:.4;transition:fill .15s;cursor:pointer}
  .light .country{stroke:#fff}
  .country.outside{fill:var(--country-out);stroke:var(--country-out-stroke);pointer-events:none;cursor:default}
  .country:not(.outside):hover{fill:var(--country-hover)}
  .country.found{fill:var(--found);stroke:var(--found-stroke);stroke-width:.6;cursor:default;pointer-events:none}
  .country.hint{fill:var(--hint) !important;animation:pulse 1s infinite}
  .country.flash-correct{fill:var(--correct) !important}
  .country.flash-wrong{fill:var(--wrong) !important}

  .legend{position:absolute;left:18px;bottom:14px;background:rgba(15,19,28,.8);backdrop-filter:blur(6px);padding:8px 12px;border-radius:8px;font-size:.72rem;color:var(--text2);display:flex;gap:14px;align-items:center;border:1px solid var(--border)}
  .light .legend{background:rgba(255,255,255,.85)}
  .legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:middle}

  @keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .shake{animation:shake .3s}

  /* Pop emoji ao acertar */
  .pop{position:fixed;font-size:3.4rem;pointer-events:none;z-index:250;
    text-shadow:0 4px 18px rgba(0,0,0,.5);animation:pop 1.4s ease-out forwards}
  @keyframes pop{
    0%{transform:translate(-50%,-50%) scale(0);opacity:0}
    20%{transform:translate(-50%,-60%) scale(1.6);opacity:1}
    60%{transform:translate(-50%,-100%) scale(1.1);opacity:1}
    100%{transform:translate(-50%,-160%) scale(.9);opacity:0}
  }

  /* Mares */
  .mares{transition:opacity .3s}
  .mares.hidden{opacity:0;pointer-events:none}
  .mares text{
    fill:#7eb6e2;font-style:italic;font-weight:600;text-anchor:middle;
    paint-order:stroke;stroke:rgba(15,19,28,.9);stroke-width:4px;stroke-linejoin:round;
    pointer-events:none;letter-spacing:.5px;
  }
  .mares text.big{font-size:24px}
  .mares text.med{font-size:18px}
  .mares text.sml{font-size:14px}
  .light .mares text{fill:#1e4d7a;stroke:rgba(255,255,255,.95)}

  /* Barra de progreso */
  .progress{height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-bottom:8px}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
    width:0%;transition:width .35s cubic-bezier(.22,1,.36,1);border-radius:99px}

  /* Canvas confeti */
  #confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:240}

  .controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;justify-content:center;align-items:center}
  .btn{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:10px;cursor:pointer;font-weight:600;font-size:.88rem;transition:all .15s;font-family:inherit}
  .btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
  select.btn{appearance:none;-webkit-appearance:none;padding-right:32px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238b92a8' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:460px;width:100%;text-align:center}
  .modal h2{font-size:1.5rem;margin-bottom:14px}
  .modal .stats{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px}
  .modal .stats strong{font-size:2.4rem;color:var(--accent2);display:block;line-height:1}
  .modal .stats p{color:var(--text2);font-size:.85rem;margin-top:6px}
  .modal .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  .loading{text-align:center;padding:80px 20px;color:var(--text2);font-size:.95rem}
  .help{font-size:.78rem;color:var(--text2);text-align:center;margin-top:10px}

  @media (max-width:720px){
    .game-wrap{padding:12px}
    .hud{grid-template-columns:1fr 1fr;gap:10px;padding:14px}
    .hud-target{grid-column:1 / -1;text-align:center}
    .hud-target-name{font-size:1.4rem}
    .hud-stat{min-width:0;padding:8px}
    .header h1{font-size:1rem}
    .controls .btn{flex:1 1 calc(50% - 5px);font-size:.82rem;padding:9px 10px}
    .legend{display:none}
  }
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="../xogos-interactivos.html" title="Volver aos xogos">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
  </a>
  <h1>🇪🇺 Mapa da Unión Europea · Países</h1>
  <div class="header-right">
    <button class="icon-btn" id="seaBtn" title="Mostrar/ocultar mares">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2c1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2c1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2c1.3 0 1.9.5 2.5 1"/></svg>
    </button>
    <button class="icon-btn" id="muteBtn" title="Silenciar son">
      <svg id="iVol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.384 3.384A.705.705 0 0 0 11 19.298z"/><path d="M16 9a5 5 0 0 1 0 6"/></svg>
      <svg id="iMute" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.384 3.384A.705.705 0 0 0 11 19.298z"/><line x1="22" x2="16" y1="9" y2="15"/><line x1="16" x2="22" y1="9" y2="15"/></svg>
    </button>
    <button class="icon-btn" id="themeBtn" title="Cambiar tema">
      <svg id="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      <svg id="sun" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    </button>
  </div>
</div>

<div class="game-wrap">
  <div class="hud" id="hud">
    <div class="hud-target">
      <small>Encuentra este país de la UE</small>
      <div class="hud-target-name" id="target">Cargando…</div>
    </div>
    <div class="hud-stat ok"><strong id="score">0</strong><div class="label">Aciertos</div></div>
    <div class="hud-stat bad"><strong id="errors">0</strong><div class="label">Errores</div></div>
    <div class="hud-stat"><strong id="round">0/0</strong><div class="label">Ronda</div></div>
  </div>

  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>

  <div class="map-container">
    <div class="loading" id="loading">Cargando mapa de Europa…</div>
    <svg id="map" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid meet" style="display:none"></svg>
    <div class="legend">
      <span><span class="legend-dot" style="background:var(--country)"></span>27 países UE</span>
      <span><span class="legend-dot" style="background:var(--found)"></span>Acertado</span>
    </div>
  </div>

  <div class="controls">
    <select class="btn" id="difficulty" title="Dificultad">
      <option value="easy">Fácil · 12 países principales</option>
      <option value="all" selected>Todos · 27 países UE</option>
    </select>
    <select class="btn" id="length" title="Número de preguntas">
      <option value="10">10 preguntas</option>
      <option value="20">20 preguntas</option>
      <option value="0" selected>Todos</option>
    </select>
    <button class="btn" id="skip">Saltar país</button>
    <button class="btn primary" id="restart">Nueva partida</button>
  </div>
  <div class="help">Pulsa en el país de la UE que aparece arriba. Tras 2 fallos, el país parpadea en naranja como pista.</div>
</div>

<canvas id="confettiCanvas"></canvas>
<script src="https://unpkg.com/d3@7"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
// Países UE-27 (ISO 3166-1 numérico)
const EU = new Set([
  "040","056","100","191","196","203","208","233","246","250","276","300",
  "348","372","380","428","440","442","470","528","616","620","642","703",
  "705","724","752"
]);

// Subconjunto "fácil" (12 países más reconocibles para primaria)
const EU_EASY = new Set(["724","620","250","380","276","300","372","056","528","752","616","040"]);

// Nombres en español
const NAMES = {
  "040":"Austria","056":"Bélgica","100":"Bulgaria","191":"Croacia",
  "196":"Chipre","203":"República Checa","208":"Dinamarca","233":"Estonia",
  "246":"Finlandia","250":"Francia","276":"Alemania","300":"Grecia",
  "348":"Hungría","372":"Irlanda","380":"Italia","428":"Letonia",
  "440":"Lituania","442":"Luxemburgo","470":"Malta","528":"Países Bajos",
  "616":"Polonia","620":"Portugal","642":"Rumanía","703":"Eslovaquia",
  "705":"Eslovenia","724":"España","752":"Suecia",
  // Países no UE visibles para contexto
  "008":"Albania","020":"Andorra","070":"Bosnia y Herzegovina","112":"Bielorrusia",
  "234":"Islas Feroe","268":"Georgia","292":"Gibraltar","304":"Groenlandia",
  "352":"Islandia","438":"Liechtenstein","492":"Mónaco","498":"Moldavia",
  "499":"Montenegro","504":"Marruecos","578":"Noruega","674":"San Marino",
  "688":"Serbia","716":"Zimbabue","756":"Suiza","760":"Siria","776":"Tonga",
  "792":"Turquía","804":"Ucrania","807":"Macedonia del Norte","826":"Reino Unido",
  "012":"Argelia","788":"Túnez","818":"Egipto","643":"Rusia","051":"Armenia",
  "031":"Azerbaiyán","368":"Iraq","364":"Irán","422":"Líbano","376":"Israel",
  "275":"Palestina","400":"Jordania","682":"Arabia Saudí","-99":"Kosovo"
};

let allFeatures = [];
let queue = [];
let current = null;
let score = 0, errors = 0, attempts = 0;
let totalRound = 0;

const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);

function code(f) { return String(f.id).padStart(3, '0'); }
function getName(f) { return NAMES[code(f)] || (f.properties && f.properties.name) || "(país)"; }

// ───── Áudio sintético (Web Audio API) ─────
let audioCtx = null;
let muted = localStorage.getItem('ef_audio_muted') === '1';
function ctx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
  }
  return audioCtx;
}
function tone(freq, dur, type = 'triangle', vol = 0.22, when = 0) {
  if (muted) return;
  const c = ctx(); if (!c) return;
  const t0 = c.currentTime + when;
  const osc = c.createOscillator();
  const g = c.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(g).connect(c.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.02);
}
function soundCorrect() { tone(523.25, 0.12); tone(783.99, 0.18, 'triangle', 0.22, 0.07); }
function soundWrong()   { tone(196, 0.18, 'sawtooth', 0.14); tone(146.83, 0.22, 'sawtooth', 0.12, 0.08); }
function soundFinish()  {
  [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, 0.18, 'triangle', 0.22, i * 0.10));
}

// ───── Pop de emoji sobre o país acertado ─────
function showPop(emoji, x, y) {
  const d = document.createElement('div');
  d.className = 'pop';
  d.textContent = emoji;
  d.style.left = x + 'px';
  d.style.top = y + 'px';
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 1450);
}
function popOnElement(el, emoji) {
  const r = el.getBoundingClientRect();
  showPop(emoji, r.left + r.width / 2, r.top + r.height / 2);
}

// ───── Confeti ─────
let confettiFn = null;
function initConfetti() {
  if (typeof confetti === 'undefined') return;
  confettiFn = confetti.create(document.getElementById('confettiCanvas'), { resize: true, useWorker: true });
}
function celebrate(big = false) {
  if (!confettiFn) return;
  const opts = {
    spread: big ? 110 : 70,
    particleCount: big ? 140 : 55,
    startVelocity: big ? 55 : 35,
    origin: { y: 0.7 },
    colors: ['#10b981', '#34d399', '#fbbf24', '#3b82f6', '#a78bfa', '#f472b6'],
    scalar: big ? 1.1 : .9,
  };
  confettiFn(opts);
  if (big) {
    setTimeout(() => confettiFn({ ...opts, origin: { x: .2, y: .65 } }), 200);
    setTimeout(() => confettiFn({ ...opts, origin: { x: .8, y: .65 } }), 400);
  }
}

// ───── Vibración móbil ─────
function vibrate(pattern) { try { navigator.vibrate?.(pattern); } catch (_) {} }

async function init() {
  try {
    const data = await fetch('https://unpkg.com/world-atlas@2/countries-110m.json').then(r => {
      if (!r.ok) throw new Error('No se pudo cargar el mapa');
      return r.json();
    });
    const fc = topojson.feature(data, data.objects.countries);
    // Só os 27 estados membros da UE
    allFeatures = fc.features.filter(f => EU.has(code(f)));

    // Proxección cónica conforme con escala manual — Europa máis "landscape".
    const W = 1400, H = 900;
    const projection = d3.geoConicConformal()
      .center([3, 52.5])
      .rotate([-15, 0])
      .parallels([40, 62])
      .scale(1500)
      .translate([W / 2, H / 2]);
    const path = d3.geoPath(projection);

    const svg = d3.select('#map');
    svg.selectAll('path')
      .data(allFeatures, f => f.id)
      .join('path')
      .attr('class', 'country')
      .attr('d', path)
      .attr('data-id', f => code(f))
      .attr('data-name', f => getName(f))
      .on('click', (event, f) => onClick(f, event.currentTarget));

    // Capa de mares (oculta por defecto)
    const SEAS = [
      { name: 'Océano Atlántico', coord: [-13, 47], cls: 'big' },
      { name: 'Mar Mediterráneo', coord: [10.5, 37.5], cls: 'big' },
      { name: 'Mar do Norte', coord: [3.5, 56], cls: 'med' },
      { name: 'Mar Báltico', coord: [20, 58], cls: 'med' },
      { name: 'Mar Negro', coord: [34, 43], cls: 'med' },
      { name: 'Golfo de Biscaia', coord: [-5, 45.5], cls: 'sml' },
      { name: 'Canal da Mancha', coord: [-1, 50], cls: 'sml' },
      { name: 'Mar Adriático', coord: [16, 43], cls: 'sml' },
      { name: 'Mar Exeo', coord: [25.3, 38.5], cls: 'sml' },
      { name: 'Mar Tirreno', coord: [12, 40], cls: 'sml' },
    ];
    const maresG = svg.append('g').attr('class', 'mares hidden');
    const sizes = { big: 28, med: 22, sml: 17 };
    SEAS.forEach(s => {
      const [x, y] = projection(s.coord);
      maresG.append('text')
        .attr('x', x).attr('y', y).attr('class', s.cls)
        .style('font-size', sizes[s.cls] + 'px')
        .style('font-style', 'italic')
        .style('font-weight', '700')
        .style('text-anchor', 'middle')
        .style('paint-order', 'stroke')
        .style('stroke-width', '4px')
        .style('stroke-linejoin', 'round')
        .style('letter-spacing', '.5px')
        .style('pointer-events', 'none')
        .style('fill', '#9ec9ec')
        .style('stroke', 'rgba(8,12,20,.9)')
        .text(s.name);
    });
    // En tema claro, axustar cores
    const updateMaresColor = () => {
      const isLight = document.body.classList.contains('light');
      maresG.selectAll('text')
        .style('fill', isLight ? '#1e4d7a' : '#9ec9ec')
        .style('stroke', isLight ? 'rgba(255,255,255,.95)' : 'rgba(8,12,20,.9)');
    };
    updateMaresColor();
    window._updateMaresColor = updateMaresColor;

    initConfetti();
    $('#loading').style.display = 'none';
    svg.node().style.display = 'block';

    startGame();
  } catch (e) {
    $('#loading').textContent = 'Error cargando el mapa. Recarga la página.';
    console.error(e);
  }
}

function startGame() {
  const dif = $('#difficulty').value;
  const len = parseInt($('#length').value, 10);

  const pool = dif === 'easy' ? EU_EASY : EU;
  let candidates = allFeatures.filter(f => pool.has(code(f)));
  candidates = shuffle(candidates);
  if (len > 0) candidates = candidates.slice(0, len);

  queue = candidates;
  totalRound = queue.length;
  score = 0;
  errors = 0;
  attempts = 0;
  current = null;

  $$('.country').forEach(c => c.classList.remove('found','hint','flash-correct','flash-wrong'));

  nextCountry();
}

function nextCountry() {
  if (queue.length === 0) return showResults();
  current = queue.shift();
  attempts = 0;
  $('#target').textContent = getName(current);
  $$('.country.hint').forEach(c => c.classList.remove('hint'));
  updateHUD();
}

function onClick(feature, el) {
  if (!current || el.classList.contains('found')) return;

  if (code(feature) === code(current)) {
    el.classList.add('flash-correct');
    soundCorrect();
    vibrate(60);
    const emoji = attempts === 0 ? ['⭐','🎉','🌟','✨','👏','🔥'][Math.floor(Math.random()*6)] : '👍';
    popOnElement(el, emoji);
    if (attempts === 0) celebrate(false);
    setTimeout(() => {
      el.classList.remove('flash-correct');
      el.classList.add('found');
    }, 500);
    score++;
    updateHUD();
    setTimeout(nextCountry, 650);
  } else {
    attempts++;
    errors++;
    soundWrong();
    vibrate([30, 50, 30]);
    el.classList.add('flash-wrong');
    $('#hud').classList.add('shake');
    setTimeout(() => {
      el.classList.remove('flash-wrong');
      $('#hud').classList.remove('shake');
    }, 380);

    if (attempts >= 2) {
      const correctEl = document.querySelector(`[data-id="${code(current)}"]`);
      if (correctEl) correctEl.classList.add('hint');
    }
    if (attempts >= 4) return autoFail();
    updateHUD();
  }
}

function autoFail() {
  const correctEl = document.querySelector(`[data-id="${code(current)}"]`);
  if (correctEl) {
    correctEl.classList.remove('hint');
    correctEl.classList.add('flash-wrong');
    setTimeout(() => {
      correctEl.classList.remove('flash-wrong');
      correctEl.classList.add('found');
    }, 700);
  }
  setTimeout(nextCountry, 800);
}

function skipCountry() {
  if (!current) return;
  errors++;
  autoFail();
  updateHUD();
}

function updateHUD() {
  $('#score').textContent = score;
  $('#errors').textContent = errors;
  const done = totalRound - queue.length - (current ? 1 : 0);
  const idx = current ? done + 1 : done;
  $('#round').textContent = `${idx}/${totalRound}`;
  const pct = totalRound ? Math.min(100, (score / totalRound) * 100) : 0;
  $('#progressFill').style.width = pct + '%';
}

function showResults() {
  current = null;
  const pct = totalRound ? Math.round(100 * score / totalRound) : 0;
  let msg = '¡Inténtalo otra vez!';
  if (pct >= 90) msg = '¡Excelente! 🌟';
  else if (pct >= 70) msg = '¡Muy bien! 👏';
  else if (pct >= 50) msg = 'Buen intento, sigue practicando.';
  soundFinish();
  if (pct >= 70) celebrate(true);

  const m = document.createElement('div');
  m.className = 'modal-bg';
  m.innerHTML = `
    <div class="modal">
      <h2>${msg}</h2>
      <div class="stats">
        <strong>${score}/${totalRound}</strong>
        <p>${errors} errores · ${pct}% de aciertos</p>
      </div>
      <div class="actions">
        <button class="btn primary" id="mAgain">Nueva partida</button>
        <button class="btn" id="mClose">Cerrar</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  m.querySelector('#mAgain').onclick = () => { m.remove(); startGame(); };
  m.querySelector('#mClose').onclick = () => m.remove();
}

function shuffle(a) {
  const arr = a.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

$('#restart').onclick = startGame;
$('#skip').onclick = skipCountry;
$('#difficulty').onchange = startGame;
$('#length').onchange = startGame;

$('#themeBtn').onclick = () => {
  document.body.classList.toggle('light');
  $('#moon').classList.toggle('hidden');
  $('#sun').classList.toggle('hidden');
  localStorage.setItem('ef_theme', document.body.classList.contains('light') ? 'light' : 'dark');
};
if (localStorage.getItem('ef_theme') === 'light') {
  document.body.classList.add('light');
  $('#moon').classList.add('hidden');
  $('#sun').classList.remove('hidden');
}

// Mute / unmute
function refreshMuteIcon() {
  $('#iVol').classList.toggle('hidden', muted);
  $('#iMute').classList.toggle('hidden', !muted);
  $('#muteBtn').setAttribute('title', muted ? 'Activar son' : 'Silenciar son');
}
$('#muteBtn').onclick = () => {
  muted = !muted;
  localStorage.setItem('ef_audio_muted', muted ? '1' : '0');
  refreshMuteIcon();
  if (!muted) { try { ctx()?.resume(); } catch (_) {} tone(660, 0.08); }
};
refreshMuteIcon();

// Mares toggle
$('#seaBtn').onclick = () => {
  const g = document.querySelector('.mares');
  if (g) g.classList.toggle('hidden');
  $('#seaBtn').classList.toggle('active');
};

// Despertar AudioContext na primeira interacción do usuario (bloquead@ por defecto)
const wakeAudio = () => { try { ctx()?.resume(); } catch (_) {} document.removeEventListener('click', wakeAudio); document.removeEventListener('keydown', wakeAudio); };
document.addEventListener('click', wakeAudio, { once: true });
document.addEventListener('keydown', wakeAudio, { once: true });

init();
</script>
</body>
</html>
