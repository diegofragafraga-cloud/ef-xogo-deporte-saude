<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa do Mundo · Países</title>
<style>
  :root {
    --bg:#0b0d13; --bg2:#13161f; --bg3:#1c2030;
    --text:#e8eaf0; --text2:#8b92a8;
    --accent:#10b981; --accent2:#34d399;
    --border:#252a3a; --radius:14px;
    --country:#2a3347; --country-hover:#3a4565;
    --found:rgba(16,185,129,.55); --found-stroke:#10b981;
    --correct:#10b981; --wrong:#ef4444; --hint:#f59e0b;
    --ocean:#0f131c;
  }
  .light {
    --bg:#f0f2f7; --bg2:#fff; --bg3:#e8eaf0;
    --text:#13161f; --text2:#6b7280; --border:#d1d5db;
    --country:#cbd5e1; --country-hover:#94a3b8;
    --found:rgba(16,185,129,.45); --ocean:#dbeafe;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .hidden{display:none !important}

  .header{
    display:flex;align-items:center;gap:12px;
    padding:14px 22px;background:var(--bg2);
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
  }
  .back-btn{
    background:var(--bg3);border:1px solid var(--border);color:var(--text);
    width:36px;height:36px;border-radius:8px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    text-decoration:none;transition:all .2s;flex-shrink:0;
  }
  .back-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .back-btn svg{width:18px;height:18px}
  .header h1{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:10px}
  .header-right{margin-left:auto;display:flex;gap:8px}
  .icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .icon-btn:hover{background:var(--accent);color:#fff}
  .icon-btn svg{width:16px;height:16px}

  .game-wrap{max-width:1280px;margin:0 auto;padding:18px}

  .hud{
    display:grid;grid-template-columns:1fr auto auto auto;gap:14px;align-items:center;
    background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 22px;margin-bottom:14px;
  }
  .hud-target small{display:block;font-size:.66rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1.6px;margin-bottom:6px}
  .hud-target-name{font-size:1.7rem;font-weight:800;color:var(--accent2);line-height:1.1}
  .hud-stat{background:var(--bg3);padding:10px 14px;border-radius:10px;min-width:92px;text-align:center;border:1px solid var(--border)}
  .hud-stat strong{font-size:1.3rem;display:block;color:var(--text)}
  .hud-stat .label{font-size:.66rem;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin-top:2px}
  .hud-stat.ok strong{color:var(--accent2)}
  .hud-stat.bad strong{color:var(--wrong)}

  .map-container{
    background:var(--ocean);border:1px solid var(--border);border-radius:var(--radius);
    padding:8px;position:relative;overflow:hidden;
  }
  #map{width:100%;height:auto;display:block;touch-action:manipulation}
  .country{fill:var(--country);stroke:var(--bg2);stroke-width:.4;transition:fill .15s;cursor:pointer}
  .light .country{stroke:#fff}
  .country:hover{fill:var(--country-hover)}
  .country.found{fill:var(--found);stroke:var(--found-stroke);stroke-width:.6;cursor:default;pointer-events:none}
  .country.hint{fill:var(--hint) !important;animation:pulse 1s infinite}
  .country.flash-correct{fill:var(--correct) !important}
  .country.flash-wrong{fill:var(--wrong) !important}
  .country.unselectable{pointer-events:none;opacity:.55}

  @keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .shake{animation:shake .3s}

  .controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;justify-content:center;align-items:center}
  .btn{
    background:var(--bg3);color:var(--text);border:1px solid var(--border);
    padding:10px 18px;border-radius:10px;cursor:pointer;font-weight:600;font-size:.88rem;
    transition:all .15s;font-family:inherit;
  }
  .btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
  select.btn{appearance:none;-webkit-appearance:none;padding-right:32px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238b92a8' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:460px;width:100%;text-align:center}
  .modal h2{font-size:1.5rem;margin-bottom:14px}
  .modal .stats{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px}
  .modal .stats strong{font-size:2.4rem;color:var(--accent2);display:block;line-height:1}
  .modal .stats p{color:var(--text2);font-size:.85rem;margin-top:6px}
  .modal .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  .loading{text-align:center;padding:80px 20px;color:var(--text2);font-size:.95rem}
  .help{font-size:.78rem;color:var(--text2);text-align:center;margin-top:10px}

  @media (max-width:720px){
    .game-wrap{padding:12px}
    .hud{grid-template-columns:1fr 1fr;gap:10px;padding:14px}
    .hud-target{grid-column:1 / -1;text-align:center}
    .hud-target-name{font-size:1.4rem}
    .hud-stat{min-width:0;padding:8px}
    .header h1{font-size:1rem}
    .controls .btn{flex:1 1 calc(50% - 5px);font-size:.82rem;padding:9px 10px}
  }
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="../xogos-interactivos.html" title="Volver aos xogos">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
  </a>
  <h1>🌍 Mapa do mundo · Países</h1>
  <div class="header-right">
    <button class="icon-btn" id="themeBtn" title="Cambiar tema">
      <svg id="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      <svg id="sun" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    </button>
  </div>
</div>

<div class="game-wrap">
  <div class="hud" id="hud">
    <div class="hud-target">
      <small>Encuentra este país</small>
      <div class="hud-target-name" id="target">Cargando…</div>
    </div>
    <div class="hud-stat ok"><strong id="score">0</strong><div class="label">Aciertos</div></div>
    <div class="hud-stat bad"><strong id="errors">0</strong><div class="label">Errores</div></div>
    <div class="hud-stat"><strong id="round">0/0</strong><div class="label">Ronda</div></div>
  </div>

  <div class="map-container">
    <div class="loading" id="loading">Cargando mapa do mundo…</div>
    <svg id="map" viewBox="0 0 980 500" preserveAspectRatio="xMidYMid meet" style="display:none"></svg>
  </div>

  <div class="controls">
    <select class="btn" id="difficulty" title="Dificultad">
      <option value="easy">Fácil · ~30 países</option>
      <option value="medium">Medio · ~75 países</option>
      <option value="hard">Difícil · todos</option>
    </select>
    <select class="btn" id="length" title="Número de preguntas">
      <option value="10">10 preguntas</option>
      <option value="20">20 preguntas</option>
      <option value="0">Todos</option>
    </select>
    <button class="btn" id="skip">Saltar país</button>
    <button class="btn primary" id="restart">Nueva partida</button>
  </div>
  <div class="help">Pulsa en el país que aparece arriba. Tras 2 fallos, el país parpadea en naranja como pista.</div>
</div>

<script src="https://unpkg.com/d3@7"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script>
// ───── Mapa ISO numérico → nombre en español ─────
const NAMES = {
  "004":"Afganistán","008":"Albania","010":"Antártida","012":"Argelia","016":"Samoa Americana",
  "020":"Andorra","024":"Angola","028":"Antigua y Barbuda","031":"Azerbaiyán","032":"Argentina",
  "036":"Australia","040":"Austria","044":"Bahamas","048":"Baréin","050":"Bangladés",
  "051":"Armenia","052":"Barbados","056":"Bélgica","060":"Bermudas","064":"Bután",
  "068":"Bolivia","070":"Bosnia y Herzegovina","072":"Botsuana","074":"Isla Bouvet","076":"Brasil",
  "084":"Belice","086":"Territorio Británico del Océano Índico","090":"Islas Salomón","092":"Islas Vírgenes Británicas","096":"Brunéi",
  "100":"Bulgaria","104":"Birmania (Myanmar)","108":"Burundi","112":"Bielorrusia","116":"Camboya",
  "120":"Camerún","124":"Canadá","132":"Cabo Verde","136":"Islas Caimán","140":"República Centroafricana",
  "144":"Sri Lanka","148":"Chad","152":"Chile","156":"China","158":"Taiwán",
  "162":"Isla de Navidad","166":"Islas Cocos","170":"Colombia","174":"Comoras","175":"Mayotte",
  "178":"Congo","180":"R.D. del Congo","184":"Islas Cook","188":"Costa Rica","191":"Croacia",
  "192":"Cuba","196":"Chipre","203":"República Checa","204":"Benín","208":"Dinamarca",
  "212":"Dominica","214":"República Dominicana","218":"Ecuador","222":"El Salvador","226":"Guinea Ecuatorial",
  "231":"Etiopía","232":"Eritrea","233":"Estonia","234":"Islas Feroe","238":"Islas Malvinas",
  "239":"Georgia del Sur","242":"Fiyi","246":"Finlandia","248":"Åland","250":"Francia",
  "254":"Guayana Francesa","258":"Polinesia Francesa","260":"Tierras Australes Francesas","262":"Yibuti","266":"Gabón",
  "268":"Georgia","270":"Gambia","275":"Palestina","276":"Alemania","288":"Ghana",
  "292":"Gibraltar","296":"Kiribati","300":"Grecia","304":"Groenlandia","308":"Granada",
  "312":"Guadalupe","316":"Guam","320":"Guatemala","324":"Guinea","328":"Guyana",
  "332":"Haití","334":"Isla Heard","336":"Vaticano","340":"Honduras","344":"Hong Kong",
  "348":"Hungría","352":"Islandia","356":"India","360":"Indonesia","364":"Irán",
  "368":"Iraq","372":"Irlanda","376":"Israel","380":"Italia","384":"Costa de Marfil",
  "388":"Jamaica","392":"Japón","398":"Kazajistán","400":"Jordania","404":"Kenia",
  "408":"Corea del Norte","410":"Corea del Sur","414":"Kuwait","417":"Kirguistán","418":"Laos",
  "422":"Líbano","426":"Lesoto","428":"Letonia","430":"Liberia","434":"Libia",
  "438":"Liechtenstein","440":"Lituania","442":"Luxemburgo","446":"Macao","450":"Madagascar",
  "454":"Malaui","458":"Malasia","462":"Maldivas","466":"Malí","470":"Malta",
  "474":"Martinica","478":"Mauritania","480":"Mauricio","484":"México","492":"Mónaco",
  "496":"Mongolia","498":"Moldavia","499":"Montenegro","500":"Montserrat","504":"Marruecos",
  "508":"Mozambique","512":"Omán","516":"Namibia","520":"Nauru","524":"Nepal",
  "528":"Países Bajos","531":"Curazao","533":"Aruba","534":"San Martín","535":"San Eustaquio",
  "540":"Nueva Caledonia","548":"Vanuatu","554":"Nueva Zelanda","558":"Nicaragua","562":"Níger",
  "566":"Nigeria","570":"Niue","574":"Isla Norfolk","578":"Noruega","580":"Marianas del Norte",
  "581":"Islas menores de EE. UU.","583":"Micronesia","584":"Islas Marshall","585":"Palaos","586":"Pakistán",
  "591":"Panamá","598":"Papúa Nueva Guinea","600":"Paraguay","604":"Perú","608":"Filipinas",
  "612":"Pitcairn","616":"Polonia","620":"Portugal","624":"Guinea-Bisáu","626":"Timor Oriental",
  "630":"Puerto Rico","634":"Catar","638":"Reunión","642":"Rumanía","643":"Rusia",
  "646":"Ruanda","652":"San Bartolomé","654":"Santa Elena","659":"San Cristóbal y Nieves","660":"Anguila",
  "662":"Santa Lucía","663":"San Martín (FR)","666":"San Pedro y Miquelón","670":"San Vicente","674":"San Marino",
  "678":"Santo Tomé y Príncipe","682":"Arabia Saudí","686":"Senegal","688":"Serbia","690":"Seychelles",
  "694":"Sierra Leona","702":"Singapur","703":"Eslovaquia","704":"Vietnam","705":"Eslovenia",
  "706":"Somalia","710":"Sudáfrica","716":"Zimbabue","724":"España","728":"Sudán del Sur",
  "729":"Sudán","732":"Sahara Occidental","740":"Surinam","744":"Svalbard","748":"Esuatini",
  "752":"Suecia","756":"Suiza","760":"Siria","762":"Tayikistán","764":"Tailandia",
  "768":"Togo","772":"Tokelau","776":"Tonga","780":"Trinidad y Tobago","784":"Emiratos Árabes Unidos",
  "788":"Túnez","792":"Turquía","795":"Turkmenistán","796":"Islas Turcas y Caicos","798":"Tuvalu",
  "800":"Uganda","804":"Ucrania","807":"Macedonia del Norte","818":"Egipto","826":"Reino Unido",
  "831":"Guernsey","832":"Jersey","833":"Isla de Man","834":"Tanzania","840":"Estados Unidos",
  "850":"Islas Vírgenes (EE.UU.)","854":"Burkina Faso","858":"Uruguay","860":"Uzbekistán","862":"Venezuela",
  "876":"Wallis y Futuna","882":"Samoa","887":"Yemen","894":"Zambia",
  "-99":"Kosovo"  // Kosovo se representa como -99 en algunos datasets
};

// ───── Grupos por dificultad (códigos ISO numéricos) ─────
const EASY = ["724","620","250","380","276","826","372","056","528","756","040","300","616","643","752","578","208","246","840","124","484","076","032","152","170","604","156","392","356","818","504","710","036","554"];

const MEDIUM_ADD = ["352","203","348","642","100","804","792","682","364","368","376","760","422","400","586","004","764","704","360","608","410","408","496","398","050","524","231","404","566","012","788","434","729","180","834","450","024","686","288","862","858","600","068","218","192","214","320","188","591","332","442","620","438"];

// ───── Estado del juego ─────
let allFeatures = [];
let queue = [];
let current = null;
let score = 0, errors = 0, attempts = 0;
let totalRound = 0;

const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);

function code(f) {
  return String(f.id).padStart(3, '0');
}
function getName(f) {
  return NAMES[code(f)] || (f.properties && f.properties.name) || "(país desconocido)";
}

async function init() {
  try {
    const data = await fetch('https://unpkg.com/world-atlas@2/countries-110m.json').then(r => {
      if (!r.ok) throw new Error('No se pudo cargar el mapa');
      return r.json();
    });
    const fc = topojson.feature(data, data.objects.countries);
    allFeatures = fc.features.filter(f => code(f) !== "010"); // sin Antártida (visualmente domina)

    const projection = d3.geoNaturalEarth1().fitSize([980, 500], { type: "FeatureCollection", features: allFeatures });
    const path = d3.geoPath(projection);

    const svg = d3.select('#map');
    svg.selectAll('path')
      .data(allFeatures, f => f.id)
      .join('path')
      .attr('class', 'country')
      .attr('d', path)
      .attr('data-id', f => code(f))
      .attr('data-name', f => getName(f))
      .on('click', (event, f) => onClick(f, event.currentTarget));

    $('#loading').style.display = 'none';
    svg.node().style.display = 'block';

    startGame();
  } catch (e) {
    $('#loading').textContent = 'Error cargando el mapa. Recarga la página.';
    console.error(e);
  }
}

function startGame() {
  const dif = $('#difficulty').value;
  const len = parseInt($('#length').value, 10);

  let pool;
  if (dif === 'easy') pool = EASY;
  else if (dif === 'medium') pool = [...EASY, ...MEDIUM_ADD];
  else pool = allFeatures.map(f => code(f));

  const poolSet = new Set(pool);
  let candidates = allFeatures.filter(f => poolSet.has(code(f)));
  candidates = shuffle(candidates);
  if (len > 0) candidates = candidates.slice(0, len);

  queue = candidates;
  totalRound = queue.length;
  score = 0;
  errors = 0;
  attempts = 0;
  current = null;

  // Reset visuals
  $$('.country').forEach(c => c.classList.remove('found','hint','flash-correct','flash-wrong','unselectable'));

  // Marcar países fuera del pool como no clicables (visualmente sutiles, sólo en fácil/medio)
  if (dif !== 'hard') {
    $$('.country').forEach(c => {
      if (!poolSet.has(c.dataset.id)) c.classList.add('unselectable');
    });
  }

  nextCountry();
}

function nextCountry() {
  if (queue.length === 0) {
    showResults();
    return;
  }
  current = queue.shift();
  attempts = 0;
  $('#target').textContent = getName(current);
  // limpiar pista si quedaba
  $$('.country.hint').forEach(c => c.classList.remove('hint'));
  updateHUD();
}

function onClick(feature, el) {
  if (!current || el.classList.contains('found') || el.classList.contains('unselectable')) return;

  if (String(feature.id) === String(current.id)) {
    el.classList.add('flash-correct');
    setTimeout(() => {
      el.classList.remove('flash-correct');
      el.classList.add('found');
    }, 500);
    score++;
    updateHUD();
    setTimeout(nextCountry, 650);
  } else {
    attempts++;
    errors++;
    el.classList.add('flash-wrong');
    $('#hud').classList.add('shake');
    setTimeout(() => {
      el.classList.remove('flash-wrong');
      $('#hud').classList.remove('shake');
    }, 380);

    if (attempts >= 2) {
      const correctEl = document.querySelector(`[data-id="${code(current)}"]`);
      if (correctEl) correctEl.classList.add('hint');
    }
    if (attempts >= 4) {
      autoFail();
      return;
    }
    updateHUD();
  }
}

function autoFail() {
  const correctEl = document.querySelector(`[data-id="${code(current)}"]`);
  if (correctEl) {
    correctEl.classList.remove('hint');
    correctEl.classList.add('flash-wrong');
    setTimeout(() => {
      correctEl.classList.remove('flash-wrong');
      correctEl.classList.add('found');
    }, 700);
  }
  setTimeout(nextCountry, 800);
}

function skipCountry() {
  if (!current) return;
  errors++;
  autoFail();
  updateHUD();
}

function updateHUD() {
  $('#score').textContent = score;
  $('#errors').textContent = errors;
  const done = totalRound - queue.length - (current ? 1 : 0);
  const idx = current ? done + 1 : done;
  $('#round').textContent = `${idx}/${totalRound}`;
}

function showResults() {
  current = null;
  const pct = totalRound ? Math.round(100 * score / totalRound) : 0;
  let msg = '¡Inténtalo otra vez!';
  if (pct >= 90) msg = '¡Excelente! 🌟';
  else if (pct >= 70) msg = '¡Muy bien! 👏';
  else if (pct >= 50) msg = 'Buen intento, sigue practicando.';

  const m = document.createElement('div');
  m.className = 'modal-bg';
  m.innerHTML = `
    <div class="modal">
      <h2>${msg}</h2>
      <div class="stats">
        <strong>${score}/${totalRound}</strong>
        <p>${errors} errores · ${pct}% de aciertos</p>
      </div>
      <div class="actions">
        <button class="btn primary" id="mAgain">Nueva partida</button>
        <button class="btn" id="mClose">Cerrar</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  m.querySelector('#mAgain').onclick = () => { m.remove(); startGame(); };
  m.querySelector('#mClose').onclick = () => m.remove();
}

function shuffle(a) {
  const arr = a.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ───── UI: tema y botones ─────
$('#restart').onclick = startGame;
$('#skip').onclick = skipCountry;
$('#difficulty').onchange = startGame;
$('#length').onchange = startGame;

$('#themeBtn').onclick = () => {
  document.body.classList.toggle('light');
  $('#moon').classList.toggle('hidden');
  $('#sun').classList.toggle('hidden');
  localStorage.setItem('ef_theme', document.body.classList.contains('light') ? 'light' : 'dark');
};

if (localStorage.getItem('ef_theme') === 'light') {
  document.body.classList.add('light');
  $('#moon').classList.add('hidden');
  $('#sun').classList.remove('hidden');
}

init();
</script>
</body>
</html>
